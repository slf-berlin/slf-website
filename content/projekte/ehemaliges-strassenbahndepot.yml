titel: "Ehemaliges Straßenbahndepot"
untertitel: "Bezirk Tempelhof-Schöneberg, 2020"
beschreibung: "Für das denkmalgeschützte Ensemble, das gegenwärtig als Fahrzeuglager genutzt wird, wurden Entwicklungsvorschläge für ein Kultur- und Quartierszentrum erarbeitet. Auf der Grundlage der Ergebnisse der Öffentlichkeitsbeteiligung 2017 wurden die damals geäußerten Nutzungsvorschläge in einem städtebaulichen Konzept konkretisiert. Gegenwärtig befinden sich die Ergebnisse der Studie noch in Abstimmung mit dem Bezirksamt und den Landeseinrichtungen. Meininger Straße Vorplatz"
