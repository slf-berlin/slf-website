titel: "Ausbau Südschnellweg / B3 Hannover"
untertitel: "Nichtoffener verkehrs-, stadt- und freiraumplanerischer Ideenwettbewerb 2016"
beschreibung: "Konzept für einen 3,8 km langen Abschnitt des Südschnellwegs durch den Landschaftsraum der Leine-Niederung und den Stadtraum des Stadtteils Döhren in Hannover Das Konzept sieht eine minimalinvasive Erneuerung der Schnellstraße in Dammlage im Westen; Verlegung der Schnellstraße in einen Tunnel und somit Einleitung einer Transformation des Stadtraums zur Gewinnung von Bau- und Freiflächen in Döhren"
