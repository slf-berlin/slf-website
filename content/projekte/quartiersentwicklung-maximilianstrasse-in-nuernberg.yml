      - breite: 50
        html: "<p>Ein Schwerpunkt der Entwicklung liegt auf der Schaffung von ca. 178 Wohneinheiten, die durch vielfältige Angebote wie eine Kindertagesstätte mit 124 Plätzen, Flächen für Coworking und gastronomische Einrichtungen im Erdgeschoss ergänzt werden.Besonders hervorzuheben ist das „Quartiers Haus“ im ehemaligen VAG-Verwaltungsgebäude, das neben dem Kindergarten auch innovative Wohnformen wie Cluster- und Mehr-generationenwohnen integriert und durch ein „Klimaregal“ an der Fassade sowie begrünte Dachterrassen die Lebensqualität im Viertel steigert.</p><p>Das Mobilitätskonzept verfolgt das Ziel eines autoarmen Quartiers und nutzt die hervorragende Anbindung an den ÖPNV, um den motorisierten Individualverkehr zugunsten von Fuß- und Radwegen zu reduzieren. Für die notwendige Erschließung sorgt eine Tiefgarage mit 124 Stellplätzen, in der ein innovatives Team-Carsharing-Modell sowie Fahrradgaragen mit E-Ladestationen den Bewohnern nachhaltige und flexible Fortbewegungs-möglichkeiten direkt vor der Haustür bieten.</p>"
