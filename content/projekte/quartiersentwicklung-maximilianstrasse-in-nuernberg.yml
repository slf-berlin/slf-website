inhalt:
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p>Das neue Quartier am ehemaligen VAG-Standort an der Maximilian und Fürther Straße kombiniert städtebauliche Dichte, funktionale Durchmischung und nachhaltige Entwicklung mit einer starken Identität am „Maximiliansplatz“ mit der U-Bahn- und Busstation.</p><p>Das markante ehemalige Sparkassen-gebäude ist Auftakt für einen innenliegenden Freiraum mit Quartiersplatz und Spielband, der durch ein Gebäudeensemble räumlich gefasst wird und öffentlich zugänglich ist. </p><p>Neben den beiden neuen Wohngebäuden Fü116 und Max35 wird das ehemalige VAG-Verwaltungsgebäude neu programmiert und zu einem vielfältigen QuartiersHaus umgebaut. Aktive Erdgeschosszonen ermöglichen eine Belebung und Aufwertung des öffentlichen Raumes zwischen dem neuen Ensemble.</p><p>Der bisher untergenutzte innerstädtische Standort wird zu einem urbanen, lebendigen und sozial durchmischten Viertel transformiert. Der Entwurf bietet eine ortsspezifische Lösung für die zukünftigen Bedürfnisse in den Bereichen Wohnen, Versorgung, Kultur und wohnungsnahe Erholung sowie für ökologische Aspekte, Klimaresilienz und Energieeffizienz.</p>"
