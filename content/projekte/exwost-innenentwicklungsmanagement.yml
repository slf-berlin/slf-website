          \ </figure>"
      - breite: 50
        html: "<p class=\"Text\">Das Land Berlin beteiligt sich als Modellvorhaben an dem ExWoSt-Forschungsprojekt „Aktivierung von Innenentwicklungspotenzialen in wachsenden Kommunen – Erhebung und Erprobung von Bausteinen eines aktiven Managements“ des BBSR und stellt sich dem komplexen Problemfeld eines aktiven und aktivierenden Flächenmanagements. Untersuchungsraum sind hierbei Innenentwicklungsflächen im Einzugsbereich der schienengebundenen ÖPNV-Stationen außerhalb des S-Bahnrings. </p><p class=\"Text\">Ziel der Kooperation zwischen der Wohnbauleitstelle (SenStadtWohn)  und dem Projektteam ist die Erhebung neuer Flächenpotenziale und deren Betrachtung unter Berücksichtigung von akteurs- und prozessbezogenen Bewertungskriterien ergänzend zu den vorliegenden Wohnbaupotenzialstudien.</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p class=\"Text\">Parallel dazu liegt der zweite Schwerpunkt auf der Aktivierung der identifizierten Potenziale für den Wohnungsbau durch innovative Ansätze der Bauberatung und Beteiligung. </p><p class=\"Text\">Darauf aufbauend werden für ausgewählte Standorte Machbarkeitsstudien mit unterschiedlichen Akteurskonstellationen und <br />städtebaulichen Leitbildern entwickelt.</p>"
