inhalt:
  - type: "spalten"
    spalten:
      - breite: 66
        html: "<figure>

          \ <img width=\"580\" height=\"547\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/03/entree.jpg\" class=\"attachment-full size-full wp-image-530\" alt=\"\" /> <figcaption>Entreé</figcaption>

          \ </figure>"
      - breite: 33
        html: "<p>Umstrukturierungskonzept für das ca. 21,8 ha Planungsgebiet in Düsseldorf-Benrath als Grundlage für die Neunutzung eines 2015 stillgelegten Industriestandortes. Das durch Hauptverkehrstrassen begrenzte Gebiet soll zu einem vielfältigen und offenen Stadtquartier mit einem feinmaschigen Netz aus Verbindungselementen in die angrenzenden Quartiere entwickelt werden. Das Quartier bietet neue Kombinationen des Wohnen und Arbeiten und setzt sich aus fünf differenzierten Stadtbausteinen zusammen: Stadtteilschule, Werkhof, Gewerbe, Wohnhöfe und Quartierspark.</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p>Die Anforderungen an eine nachhaltige Quartiersentwicklung werden durch Dachbegrünung, Regenwassermanagement, und vielfältige Freiflächenangebote erfüllt. Aktive und passive Schallschutzmaßnahmen ermöglichen trotz des hohen Lärmpegels attraktive Wohnlagen. Das Konzept eines autoarmen Wohnquartiers wird durch mehrere Gemeinschaftsgtiefgaragen unterstützt.</p>"
