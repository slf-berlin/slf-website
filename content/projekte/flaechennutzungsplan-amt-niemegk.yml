inhalt:
  - type: "spalten"
    spalten:
      - breite: 33
        html: "<p>Das Amt Niemegk, bestehend aus den Gemeinden Planetal, Mühlenfließ, Rabenstein/Fläming sowie der Stadt Niemegk, plant die Neuaufstellung eines gemeinsamen Flächennutzungs-plans (FNP) und eines Landschaftsplans. Ziel ist die Berücksichtigung aktueller städtebaulicher Entwicklungen in den Bereichen Wohnen, Wirtschaft, Umwelt, Energie und Verkehr.</p>"
      - breite: 66
        html: "<figure>

          \ <img width=\"580\" height=\"567\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/gemeindeteile-niemegk-scaled-e1737370498140-580x567.jpg\" class=\"attachment-medium size-medium wp-image-4386\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/gemeindeteile-niemegk-scaled-e1737370498140-580x567.jpg 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/gemeindeteile-niemegk-scaled-e1737370498140-860x841.jpg 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/gemeindeteile-niemegk-scaled-e1737370498140-768x751.jpg 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/gemeindeteile-niemegk-scaled-e1737370498140-1536x1502.jpg 1536w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/gemeindeteile-niemegk-scaled-e1737370498140.jpg 1737w\" sizes=\"(max-width: 580px) 100vw, 580px\" /> <figcaption>Gemeindeteile Niemegk</figcaption>

          \ </figure>"
  - type: "text"
    html: "<p>Mit der Planung wird eine nachhaltige und zukunftsorientierte Entwicklung des Amtsgebiets gefördert. Der Flächennutzungsplan umfasst eine Fläche von rund 22.500 Hektar und bildet die Grundlage für die koordinierte Nutzung und Gestaltung der Bodennutzung im Einklang mit aktuellen gesetzlichen und regionalen Anforderungen. Parallel dazu wird der Landschaftsplan und der Umweltbericht durch FUGMANN JANOTTA PARTNER, Berlin erstellt, um die Belange von Naturschutz und Landschaftspflege umfassend in die Planung einzubinden.</p><p>Die Bürgerbeteiligung sowie die Zusammenarbeit mit Behörden und Fachexperten stehen im Mittelpunkt dieses mehrjährigen Planungsprozesses, um eine breite Akzeptanz und fachliche Qualität zu gewährleisten.</p>"
