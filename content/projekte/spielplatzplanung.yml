          \ </figure>"
      - breite: 50
        html: "<p>Darüber hinaus werden bedarfsorientierte Standort- und Maßnahmenkonzepte für identifizierte Handlungsräume entwickelt. Von besonderer Bedeutung ist hier die Berücksichtigung identifizierter Potentialflächen für die Schaffung neuer bzw. Erweiterung vorhandener Spielplätze sowie die Darstellung möglicher Synergieeffekte im Bezug auf vorhandene Planungen. </p>"
