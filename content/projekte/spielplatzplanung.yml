inhalt:
  - type: "text"
    html: "<p>Die Aktualisierung der bezirklichen Spielplatzplanung erfolgt auf Planungsraumebene. Im Jahr 2017 wurden 10 Planungsräume im Nordwesten Pankows entsprechend betrachtet. 2019 erfolgten zwei Beauftragungen zur Erweiterung der Spielplatzplanung in insgesamt neun weiteren LOR-Planungsräumen, 2024 für fünf weitere Planungsräume. Zudem wurde die vorliegende Fortschreibung der Spielplatzplanung aus dem Jahr 2017 überarbeitet. </p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<figure>

          \ <img width=\"579\" height=\"662\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/03/herthaplatz-wohnumfeld-e1737129386588.jpg\" class=\"attachment-large size-large wp-image-662\" alt=\"\" /> <figcaption>Beispielkarte Analyse Wohnumfeld</figcaption>

          \ </figure>"
      - breite: 50
        html: "<p>Im Rahmen einer GIS-basierten Datenanalyse und Darstellung werden verschiedene Arbeitsschritte auf unterschiedlichen Maßstabsebenen durchgeführt, darunter Bezirk, Betrachtungsraum, Planungsraum, Versorgungseinheit und die öffentliche Spielplätze selbst. Dabei erfolgt eine detaillierte Ermittlung der Versorgungssituation und des Bedarfs an öffentlichen Spielflächen unter Berücksichtigung bestehender Bevölkerungsprognosen, der Bebauungsstruktur und bestehender Wohnbaupotenziale. Im Zuge dessen erfolgt eine umfassende Erfassung, Betrachtung und Analyse der bestehenden öffentlichen Spielplätze, einschließlich der Erstellung von Bestandssteckbriefen.</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p>Besondere Aufmerksamkeit gilt der Identifizierung von Handlungsbedarfen in Schwerpunktbereichen, die anhand von Dringlichkeitsstufen priorisiert werden. Diese Dringlichkeitsstufen basieren auf der Methodik des StEP 2 „Öffentliche Einrichtungen, Versorgung mit wohnungsbezogenen Gemein-bedarfseinrichtungen“. Gleichzeitig werden mögliche Potenzialflächen zur Verbesserung der Spielflächenversorgung zusammengetragen.</p>"
