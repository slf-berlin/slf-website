        html: "<figure>

          \ <img width=\"860\" height=\"802\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2024/11/quartierspark-500-860x802.jpg\" class=\"attachment-large size-large wp-image-4213\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2024/11/quartierspark-500-860x802.jpg 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2024/11/quartierspark-500-580x541.jpg 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2024/11/quartierspark-500-768x716.jpg 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2024/11/quartierspark-500-1536x1432.jpg 1536w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2024/11/quartierspark-500-2048x1910.jpg 2048w\" sizes=\"(max-width: 860px) 100vw, 860px\" /> <figcaption>Vertiefungsbereich Quartierspark 1:500</figcaption>

          \ </figure>"
      - breite: 50
        html: "<p>Die nachbarschaftliche Grünfläche und der angrenzende Auwald verbinden Natur mit urbanem Leben, während vielfältige Wohnformen unterschiedliche Zielgruppen ansprechen. Ergänzt wird das Quartier durch den Schulkomplex mit Sporthalle und Sportflächen, welcher in den nächsten Jahren als flexibler Auslagerungs-standort dienen soll. </p><p>Mit Photovoltaik, Geothermie und biodiversitäts-fördernden Maßnahmen wird zudem ein Beitrag zur Klimaanpassung geleistet. Insgesamt zeigt die Darstellung ein innovatives Konzept für ein lebenswertes und zukunftssicheres Stadtquartier.</p>"
