inhalt:
  - type: "text"
    html: "<p class=\"Text\">Das neue Stadtquartier Leipzig – Leutzsch am Bahnbogen entwickelt sich von einer ehemaligen Brache an der Bahn zu einem multifunktionalen, lebenswerten und klimaangepassten Quartier. </p><p class=\"Text\">Das städtebauliche Konzept bildet die Grundlage für die Entwicklung des gesamten Bahnbogens Leutzsch. Wichtige Elemente sind das Quartiersentrée an der Georg-Schwarz-Straße, das Mobilitätsangebote und gemischte Nutzungen bietet, und der neue Park entlang des bogenförmigen Freiraums, der als verbindendes Element fungiert. Historische Gebäude und Grünstrukturen werden integriert, um Identität zu stiften und das Mikroklima zu verbessern. Das Quartier bietet Raum zum Wohnen, Arbeiten, Lernen und sozialen Austausch und schafft Übergänge zur umliegenden Natur wie dem Leutzscher Holz.</p><p>Die Qualifizierung des Siegerentwurfs erfolgt in enger Abstimmung mit der Stadt Leipzig und drei weiteren privaten Vorhabenträgern und dient als Grundlage für das sich anschließende Bebauungsplanverfahren.</p>"
