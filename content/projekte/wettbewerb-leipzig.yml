  - type: "text"
    html: "<p>Zentrale Elemente wie der Quartierspark und der Innovations-Campus bieten Raum für Gemeinschaft und Kreativität. Moderne Blockstrukturen schaffen urbane Dichte, während großzügige Freiräume den Bedürfnissen moderner Stadtbewohner gerecht werden. Nachhaltige Mobilitätsangebote, darunter ein Mobilitäts-Hub mit Fahrradgarage und Carsharing als Quartiersentrée weiterentwickelt, fördern umweltfreundliche Fortbewegung.</p>"
