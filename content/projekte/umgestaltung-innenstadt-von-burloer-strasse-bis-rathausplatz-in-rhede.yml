      - breite: 66
        html: "<p style=\"font-weight: 400;\"><strong>Nutzung</strong> – Das Klosterquartier dient überwiegend dem Wohnen und bietet vielfältige Wohntypologien in der Innenstadt von Rhede. Diese umfasst Einzelgebäude mit eigenem Grundstück und Garten, Townhouses mit Garten und Dachterrasse sowie Wohnungen und besondere Wohnformen (z.B. Mehrgenerationhaus mit Einzelwohnbereichen und Gemeinschaftsflächen). In den Neubaumaßnahmen werden ca. 60 Wohn-einheiten, davon 4 Hauseinheiten für Townhouses, geschaffen. Im platzartigen Versatz in der Burloer Straße werden im Erdgeschoss drei Gewerbeeinheiten geschaffen.</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p><strong>Mobilität</strong> – Das Mobilitätskonzept sieht eine Verbesserung der Aufenthaltsqualität in der Burloer Straße und eine Erweiterung des Wegenetzes im Klosterquartier vor. Mit den neuen Wegeverbindungen kann eine attraktive Verknüpfung mit dem bestehenden Freiraumsystem geschaffen und eine umweltverträgliche Mobilität in der Innenstadt von Rhede unterstützt werden. Die Haupterschließung des neuen Quartiers erfolgt über die bestehende Zufahrt von der Gartenstraße. In einer zentralen Tiefgarage wird der Stellplatzbedarf für die neue Wohnnutzung untergebracht.</p>"
