inhalt:
  - type: "text"
    html: "<p style=\"font-weight: 400;\">Im Sinne eines ressourcenschonenden Stadtumbaus soll der Bestand der Gebäude in das Konzept integriert und auf seine Qualitäten sowie Sanierungsmöglichkeiten hin geprüft und weiterentwickelt werden. Weiterhin kann ein Umbau von Gebäuden, z.B. durch Dachausbau, Innenausbau oder Anbauten, das Potenzial eines Bestandsgebäudes deutlich erhöhen. Auf der Brachfläche nördlich des Klosters wird durch Neubau ein zusammenhängender Wohnhof errichtet. Weiterhin werden entlang der Burloer Straße einzelne Neubauten angeordnet. Diese parzellenbasierte Entwicklung ermöglicht eine stufenweise Entwicklung unter Berücksichtigung des Bedarfes und der Grundstücksverfügbarkeit.</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p style=\"font-weight: 400;\">Das öffentliche Wegenetz wird um das Klostergebäude erweitert und bindet an einem räumlichen Versatz an die Burloer Straße an. An die Wegeverbindung sind zwei interne öffentliche Platzbereiche angegliedert, die Begegnung und Aktivität ermöglichen. In den grünen Plätzen wird der prägende Baumbestand integriert.</p><p style=\"font-weight: 400;\">Mit einer behutsamen Neuordnung des Innenstadtbereiches zwischen Burloer Straße und dem ehemaligen Kloster Gudula besteht die Chance, den Wohnstandort im Stadtzentrum von Rhede zur stärken und das Freiraumangebot zu qualifizieren. Auf Grundlage des historischen Stadtgrundrisses wird die kleinteilige Parzellenstruktur aufgegriffen und der Gebäudebestand durch Erhalt, Umbau und Neubau zu einem Wohnquartier weiterentwickelt. </p>"
      - breite: 50
        html: "<img width=\"1000\" height=\"1049\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2026/03/bildschirmfoto-2026-03-26-um-141743-scaled-e1774622689296-1000x1049.png\" class=\"attachment-large size-large wp-image-4859\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2026/03/bildschirmfoto-2026-03-26-um-141743-scaled-e1774622689296-1000x1049.png 1000w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2026/03/bildschirmfoto-2026-03-26-um-141743-scaled-e1774622689296-580x608.png 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2026/03/bildschirmfoto-2026-03-26-um-141743-scaled-e1774622689296-768x806.png 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2026/03/bildschirmfoto-2026-03-26-um-141743-scaled-e1774622689296-1464x1536.png 1464w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2026/03/bildschirmfoto-2026-03-26-um-141743-scaled-e1774622689296.png 1900w\" sizes=\"(max-width: 1000px) 100vw, 1000px\" />"
  - type: "text"
    html: "<p>Das Entwicklungskonzept greift den prägenden Gebäudemaßstab von zwei Vollgeschossen zzgl. ausgebautem Dachgeschoss auf, so dass ein Einfügen der neuen Baumaßnahmen in den Bestand gewährleistet wird. Die Dachlandschaft in der Innenstadt von Rhede ist durch geneigte, giebelständige Dächer geprägt. Einzelne Gebäude, die oft an städtebaulich markanten Situationen gelegen sind, weisen auch andere, z. B. giebelständige Dächer oder Mansardedächer auf. Dieses Prinzip wird im Konzept aufgegriffen, so dass sich die neue Gebäudestruktur in die bestehende Siedlungsstruktur behutsam einfügt und an ausgewählten Stellen neue Impulse schafft.</p>"
