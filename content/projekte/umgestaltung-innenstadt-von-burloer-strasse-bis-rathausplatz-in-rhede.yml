      - breite: 50
        html: "<p><strong>Nachhaltigkeit</strong> – Durch die Integration erhaltenswerter Bestandsbäume und Anlage grüner Wohnhöfe sollen klimatisch positive Effekte geschaffen werden. Weiterhin ist eine Regenwasserbewirtschaftung im Plangebiet mit der Rückhaltung auf Retentionsdächern, der Versickerung in Mulden und Mulden-Rigolensystemen sowie der Speicherung in Zisternen zur Bewässerung vorgesehen.</p>"
