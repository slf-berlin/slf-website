    sizes: "(max-width: 1500px) 100vw, 1500px"
  - type: "text"
    html: "<p style=\"font-weight: 400;\">Die stufenweise Entwicklung beginnt mit der Phase 1a, die das Neubauquartier auf dem Gelände der ehemaligen Gärtnerei umfasst. In der Phase 1b sind Grundstücke an der Burloer Straße einbezogen. Die Phase 2 stellt eine Option für eine Neubebauung der Grundstücke Burloer Str. 20 und Gartenstraße 2 dar. Hier sollte vorher ein Erhalt und Umbau der Bestandsgebäude auf Grundlage der Bausubstanz geprüft werden.</p>"
