titel: "Umgestaltung Innenstadt Rhede"
untertitel: "Freiraumplanerisch-städtebaulicher Realisierungswettbewerb, 2026"
beschreibung: "Im Sinne eines ressourcenschonenden Stadtumbaus soll der Bestand der Gebäude in das Konzept integriert und auf seine Qualitäten sowie Sanierungsmöglichkeiten hin geprüft und weiterentwickelt werden. Weiterhin kann ein Umbau von Gebäuden, z.B. durch Dachausbau, Innenausbau oder Anbauten, das Potenzial eines Bestandsgebäudes deutlich erhöhen. Auf der Brachfläche nördlich des Klosters wird durch Neubau ein zusammenhängender Wohnhof"
