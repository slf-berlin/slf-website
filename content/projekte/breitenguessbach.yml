    caption: " Öfnung und Erlebbarmachung des Breitengüßbaches"
  - type: "text"
    html: "<p>Dazu werden im Konzept drei Ansatzpunkte genutzt. Der erste ist die Gestaltung einer grünen Ortsmitte. Bei dem zweiten handelt es sich um die Kennzeichnung und teilweise Freilegung des Verlaufs des für die Gemeinde namengebenden Güßbachs. Drittens geht es uns um die Neuordnung der das Stadtimage prägenden Situation im Kreuzungsbereich nordwestlich der Kirche, wofür die entwickelte Neubebauung des Grundstücks Lichtenfelser Straße 2 entscheidend beiträgt.</p>"
