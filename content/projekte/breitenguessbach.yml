        html: "<figure>

          \ <img width=\"860\" height=\"574\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/12/entwurfspikto-860x574.jpg\" class=\"attachment-large size-large wp-image-1267\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/12/entwurfspikto-860x574.jpg 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/12/entwurfspikto-580x387.jpg 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/12/entwurfspikto-768x513.jpg 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/12/entwurfspikto-1536x1026.jpg 1536w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/12/entwurfspikto-2048x1368.jpg 2048w\" sizes=\"(max-width: 860px) 100vw, 860px\" /> <figcaption>Konzepte der Neuen Orstmitte</figcaption>

          \ </figure>"
      - breite: 50
        html: "<p>Die rurbane Perspektive: Dorf und Stadt sind heute vielerorts keine Gegenpole mehr, sondern unterschiedliche Erscheinungsformen urbanen Lebens. Aspekte des Ländlichen gewinnen jedoch für viele Menschen eine neue Attraktivität. Voraussetzung dafür ist die Existenz oder Schaffung markanter „rurbaner“ Orte. Das Konzept für die Neugestaltung der Ortsmitte von Breitengüßbach zielt daher auf die Stärkung dieser Narration. Mit dieser sollen die Gemeindestruktur oder einzelne ihrer Elemente nicht musealisiert werden, sondern Anwohner, Zuziehende oder Gäste sollen dafür interessiert werden, die „Erzählung“ des Orts fortzuschreiben.</p>"
