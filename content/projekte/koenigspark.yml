inhalt:
  - type: "text"
    html: "<p style=\"font-weight: 400;\"><strong>Erarbeitung einer Rahmenplanung für eine nachhaltige Quartiersentwicklung mit Bebauungsvorschlägen und Konzeptionen für die Freiraumgestaltung für einen potenziellen Gewerbestandort in Königs-Wusterhausen.</strong> </p>"
  - type: "spalten"
    spalten:
      - breite: 33
        html: "<p style=\"font-weight: 400;\">Die Stadt Königs Wusterhausen befindet sich innerhalb der dynamisch wachsenden Hauptstadt-region Berlin-Brandenburg und ist eingebettet in ein Netz aus „Zukunftsorten“ im Bereich von Wissen-schaft und Forschung. Innerhalb dieses Korridors, der seit den letzten Jahren ein qualitatives und quantitatives Wachstum erfährt, werden weiterhin zukunftsfähige Arbeitsplätze, Wohnraum, soziale Infrastruktur sowie Flächen für Freizeit und Erholung entstehen.</p>"
      - breite: 66
        html: "<figure>

          \ <img width=\"580\" height=\"321\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/12/1-entwicklungsachse-berlin-lausitz-580x321.png\" class=\"attachment-medium size-medium wp-image-4053\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/12/1-entwicklungsachse-berlin-lausitz-580x321.png 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/12/1-entwicklungsachse-berlin-lausitz-860x475.png 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/12/1-entwicklungsachse-berlin-lausitz-768x424.png 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/12/1-entwicklungsachse-berlin-lausitz.png 1330w\" sizes=\"(max-width: 580px) 100vw, 580px\" /> <figcaption></figcaption>

          \ </figure>"
  - type: "spalten"
    spalten:
      - breite: 33
        html: "<figure>

          \ <img width=\"648\" height=\"638\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/12/3-leitbild-15-min-stadt.png\" class=\"attachment-large size-large wp-image-4055\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/12/3-leitbild-15-min-stadt.png 648w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/12/3-leitbild-15-min-stadt-580x571.png 580w\" sizes=\"(max-width: 648px) 100vw, 648px\" /> <figcaption></figcaption>

          \ </figure>"
      - breite: 66
        html: "<p style=\"font-weight: 400;\">Mit dem ca. 57 ha großen Plangebiet „Königspark“ besitzt Königs Wusterhausen eine wichtige Potenzialfläche zur Gestaltung dieser Entwicklungen. Der vorliegende Rahmenplan soll als Gesamtkonzept Ideen entwickeln und städtebauliches Grundgerüst für die weitere Entwicklung festlegen. Ziel ist, die Grundlagen für einen lebendigen Zukunftsort zu schaffen, der auch Leuchtturmcharakter für die gesamte Region besitzt. In mehreren Bauabschnitten sollen im neuen „Königspark“ fünf Quartiere und eine große Grünfläche nach und nach wachsen – dabei soll es immer wieder Raum und Möglichkeiten für Anpassungen und Weiterentwicklungen geben.</p>"
