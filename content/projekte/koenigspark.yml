  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p style=\"font-weight: 400;\">In dem Rahmenplan werden mit einem zukunftsfähigen Mobilitätskonzept, einem Regenwassermanagement mit Aussagen zum Umgang mit Starkregenereignissen, der mitwachsenden sozialen Infrastruktur sowie der Ansiedlung von wohnverträglichen Arbeitsplätzen oder der Bildung von Nachbarschaften wichtige Themen für ein lebendiges Quartier in die Planung aufgenommen. </p><p style=\"font-weight: 400;\">Die Rahmenplanung wurde durch ein interdisziplinäres Planungsteam von Tchoban Voss Architekten GmbH, Hamburg sowie JKL – Junker und Kollegen Landschaftsarchitektur, Osnabrück sowie Stadt Land Fluss, Berlin erstellt. In dem Planungsprozess wurden fachgutachterlicher Untersuchungsergebnisse zu den Themen Mobilität / Verkehr, Schallschutz und Niederschlagswasser einbezogen. Der Partizipationsprozess wurde mit UMS Stadtstrategie, Leipzig durchgeführt.</p>"
