  - type: "spalten"
    spalten:
      - breite: 33
        html: "<p style=\"font-weight: 400;\">Das Plangebiet „Königspark“ liegt im Norden der Stadt Königs Wusterhausen, direkt an der B179 und nahe der A10. Die auf der Fläche intendierte gewerbliche Nutzung konnte in den letzten Jahrzehnten nicht umgesetzt werden, so dass sich nun im Zuge einer differenzierteren Mischnutzung mit einem Schwerpunkt auf das Wohnen Chancen für eine bedarfsgerechte Neuplanung ergeben. </p>"
