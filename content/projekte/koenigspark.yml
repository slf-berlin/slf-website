    html: "<p style=\"font-weight: 400;\">Auf Grundlage des Rahmenplans soll ab 2024 die Aufstellung von einem Bebauungsplan bzw. von Teilbebauungsplänen die planungsrechtliche Grundlage für eine Quartiersentwicklung geschaffen werden.</p>"
