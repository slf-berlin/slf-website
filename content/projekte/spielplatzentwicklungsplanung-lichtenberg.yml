inhalt:
  - type: "text"
    html: "<p>Nach der Bearbeitung des Spielplatzentwicklungsplans für den Versorgungsbereich Karlshorst West (VB 39) in den Jahren 2020-2021 erfolgte im Jahr 2023 eine Nachbeauftragung für den Versorgungsbereich Karlshorst Nord (VB 40). </p><p>Die Zielsetzung des Bezirks bestand jeweils darin, eine fundierte Datengrundlage zu schaffen, die unter anderem für die Ansprache privater Eigentümer:innen zur Schaffung privater Spielflächen genutzt werden kann. Hierzu erfolgte zunächst eine umfassende Bestandserfassung der öffentlichen und privaten Spielplatzversorgung durch Ortsbegehungen. </p><p>Es folgte die Erarbeitung einer Bedarfsermittlung und Defizitanalyse, welche sich an der Methodik des StEP 2 „Öffentliche Einrichtungen, Versorgung mit wohnungsbezogenen Gemeinbedarfseinrichtungen“ orientiert und der Festlegung von Dringlichkeitsstufen dient.</p>"
