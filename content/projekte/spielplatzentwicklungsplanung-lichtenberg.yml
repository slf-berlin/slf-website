          \ </figure>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p>Ein weiterer zentraler Arbeitsschritt war die Entwicklung eines Bewertungssystems sowie die Erstellung ausführlicher Steckbriefe auf Block- und Grundstücksebene für öffentliche und private Spielflächen. Ergänzend dazu erfolgt eine Potenzialflächenanalyse, die öffentliche Spielplätze, private Spielflächen sowie ergänzende Hinweise zu Freizeit- und Begegnungspunkten umfasst.</p>"
      - breite: 50
        html: "<figure>

          \ <img width=\"860\" height=\"635\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/05/beispiel-im-bericht-e1737121436819-860x635.jpg\" class=\"attachment-large size-large wp-image-4333\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/05/beispiel-im-bericht-e1737121436819-860x635.jpg 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/05/beispiel-im-bericht-e1737121436819-580x428.jpg 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/05/beispiel-im-bericht-e1737121436819-768x567.jpg 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/05/beispiel-im-bericht-e1737121436819.jpg 1536w\" sizes=\"(max-width: 860px) 100vw, 860px\" /> <figcaption>Erarbeitung eines Bewertungssystem und ausführlicher Steckbriefe auf Block- sowie Grundstücksebene</figcaption>

          \ </figure>"
  - type: "text"
    html: "<p>Für den jeweiligen Versorgungsbereich wurde ein Standort- und Maßnahmenkonzept erarbeitet, das konkrete Vorschläge für Potenzialflächen zur Anlage öffentlicher Spielplätze beinhaltet. Ergänzt wurde dieses um Hinweise für den Ausbau von (temporären) Spielstraßen, (grünen) Wegebeziehungen mit Integration von Spielpunkten oder auch informellen Bewegungsangeboten.</p>"
