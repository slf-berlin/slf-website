titel: "Spielplatzentwicklungsplanung Lichtenberg-Karlshorst"
untertitel: "Berlin, Lichtenberg"
beschreibung: "Nach der Bearbeitung des Spielplatzentwicklungsplans für den Versorgungsbereich Karlshorst West (VB 39) in den Jahren 2020-2021 erfolgte im Jahr 2023 eine Nachbeauftragung für den Versorgungsbereich Karlshorst Nord (VB 40). Die Zielsetzung des Bezirks bestand jeweils darin, eine fundierte Datengrundlage zu schaffen, die unter anderem für die Ansprache privater Eigentümer:innen zur Schaffung privater Spielflächen genutzt werden"
