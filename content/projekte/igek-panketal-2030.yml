    spalten:
      - breite: 33
        html: "Um die künftige Gemeindeentwicklung Panketals vorausschauend steuern zu können, erfolgt im Rahmen des Integrierten Gemeindeentwicklungskonzepts die Erarbeitung eines <strong>Wohnbaupotenzialkatasters</strong>. Es dient als unverbindliche Zusammenstellung von unbebauten und untergenutzten Grundstücken unter der Voraussetzung, dass sie im Zusammenhang bebauten Innenbereich oder Bebauungsplangebieten liegen, sowie eine Mindestgröße von 450m<sup>2</sup> aufweisen und planerisch für den Wohnungsbau vorgesehen sind. Das Kataster wurde in GIS angelegt und mit weiteren relevanten daten verknüpft, es ist für die gemeinde fortschreibbar strukturiert.<br />"
