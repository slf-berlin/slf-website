inhalt:
  - type: "spalten"
    spalten:
      - breite: 33
        html: "<p>Das IGEK soll die Basis für grundsätzliche Entscheidungen in der Gemeinde bilden: Gibt man dem enormen Siedlungsdruck aus Berlin ungebremst nach und wächst überproportional ODER setzt man dem Wachstum klare Grenzen sowohl in der Innenentwicklung als auch in der Außenentwicklung? In diesem Spannungsfeld zwischen moderaten oder dynamischen Wachstumszielen wird sich der IGEK-Prozess bewegen: eine Herausforderung! … denn beide o.g. Szenarien haben ihre klaren Pro und Contras sowohl aus der regionalplanerischen als auch kommunalen Perspektive.</p><p>Im Umfeld dieser Diskussion werden diese Themen im Fokus der gemeinsamen Arbeit am IGEK stehen:</p><p><strong>Innenentwicklung:</strong> Konzeption von baurechtlich sicheren Steuerungsinstrumenten, wobei gerade das Thema der Nachverdichtung im Bestand nur im Dialog mit den betroffenen Bewohner*innen behandelt werden kann</p><p>Schärfung von Funktionen und Nutzungsschwerpunkten: im Kontext der <strong>nordöstlichen Entwicklungsachs</strong>e</p><p><strong>Flächensicherung:</strong> Erhalt und Ausbau kommunaler Handlungsspielräume u.a. für die Gemeinbedarfseinrichtungen und den kommunalen Wohnungsversorgungsauftrag</p><p><strong>Schutzgut Boden:</strong> effizienter Umgang mit den wertvollen Flächen</p><p><strong>Zukunftsmobilität in Panketal:</strong> Lösen von Binnenmobilitätsthemen und Neudenken des „Transitraums“ Panketal zwischen Berlin und Bernau.</p>"
