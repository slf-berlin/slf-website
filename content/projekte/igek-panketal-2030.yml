      - breite: 66
        html: "<p>Leistungsbausteine </p><p><strong>Status-Quo-Analyse:</strong> ERKUNDEN, wo Panketal aktuell steht</p><p><strong>Leitbild:</strong> VORAUSSCHAUEN, Ziele abstecken, wohin sich Panketal zukünftig entwickeln soll</p><p><strong>Umsetzungsstrategie:</strong> ENTWICKELN von Maßnahmen zum Erreichen der gesetzten Ziele</p><p>Öffentlichkeits- und Akteursbeteiligung – Bausteine:</p><p>– Online-Befragugen</p><p>– Ortsteilspaziergänge und TeensRadtour</p><p>– Marktstände bei Rathausfest u.a. Festen</p><p>– Experten- und Beteiligungswerkstätten</p>"
