          \ </figure>"
      - breite: 50
        html: "<p>Identifizierung der Kunstsparten der freien Szene und ihrer spezifischen Anforderungen an Produktionsstandorte sowie besondere Arbeitsbedingungen; Erfassung, Klassifizierung und Verortung von ca. 440 eingestreuten Kunstproduktionsstandorten auf gesamtstädtischer Ebene</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p>Darstellung der Verdrängungsrisiken insbesondere durch konkurrierende Gewerbesparten sowie Wohnnutzungen; Überprüfung und Bewertung der planungsrechtlichen Instrumente zur Sicherung von Standorten der Kunstproduktion; </p><p>Durchführung eines Planspiels an drei typisierten Standorten in Anlehnung an Gebiete innerhalb des Bezirks Friedrichshain- Kreuzberg zur Überprüfung der planungs-rechtlichen Möglichkeiten und Konflikte bei der Sicherung der Produktionsstandorte</p>"
