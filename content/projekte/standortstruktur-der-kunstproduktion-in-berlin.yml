titel: "Standortstruktur der Kunstproduktion in Berlin"
untertitel: "Berlin"
beschreibung: "Standorte der Kunstproduktion- Gesamtstadt Identifizierung der Kunstsparten der freien Szene und ihrer spezifischen Anforderungen an Produktionsstandorte sowie besondere Arbeitsbedingungen; Erfassung, Klassifizierung und Verortung von ca. 440 eingestreuten Kunstproduktionsstandorten auf gesamtstädtischer Ebene Darstellung der Verdrängungsrisiken insbesondere durch konkurrierende Gewerbesparten sowie Wohnnutzungen; Überprüfung und Bewertung der planungsrechtlichen Instrumente zur Sicherung von Standorten der Kunstproduktion; Durchführung eines Planspiels"
