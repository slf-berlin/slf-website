inhalt:
  - type: "spalten"
    spalten:
      - breite: 33
        html: "<p>Im Rahmen des städtebaulichen Ideenwett-bewerbs „Wohnen an der Michelangelostraße“ wurde ein ca. 31 Hektar großes Wettbewerbs-gebiet betrachtet. Die Ausloberin des Wett-bewerbs war die Senatsverwaltung für Stadtent-wicklung und Umwelt in Kooperation mit dem Bezirksamt Pankow sowie dem Liegenschafts-fonds Berlin, drei Wohnungsbaugenossen-schaften, der landeseigenen GEWOBAG und der Seniorenstiftung Prenzlauer Berg.</p>"
      - breite: 66
        html: "<figure>

          \ <img width=\"580\" height=\"327\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/wp-20141216-15-50-04-pro-580x327.jpg\" class=\"attachment-medium size-medium wp-image-4295\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/wp-20141216-15-50-04-pro-580x327.jpg 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/wp-20141216-15-50-04-pro-860x484.jpg 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/wp-20141216-15-50-04-pro-768x432.jpg 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/wp-20141216-15-50-04-pro-1536x865.jpg 1536w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/wp-20141216-15-50-04-pro-2048x1153.jpg 2048w\" sizes=\"(max-width: 580px) 100vw, 580px\" /> <figcaption>Preisgerichtssitzung</figcaption>

          \ </figure>"
  - type: "spalten"
    spalten:
      - breite: 33
        html: "<p>Die Hauptaufgabe des Wettbewerbs bestand darin, eine Nachverdichtung beiderseits der Michelangelostraße, auf vorwiegend öffentlichen Stellplatzflächen aber auch in einer Wohn-siedlung der 1960er Jahre, umzusetzen. Dabei sollte vor allem neuer Wohnraum geschaffen werden inklusive eines Grundschulstandorts, einer Kita und einer Sporthalle. Außerdem waren eine gestalterische Straßenraum-Aufwertung der Michelangelostraße sowie die Weiterentwicklung der Freiräume des Gebietes vorgesehen.</p>"
