      - breite: 66
        html: "<p>Zentrale Rolle der Verfahrensbetreuung des zwei-phasigen, offenen städtebaulichen Ideenwettbewerbs bestand darin, die Aufgabenstellung zu formulieren, die Auslobung zu erstellen und die Koordination und Durch-führung der Vorprüfung zu übernehmen. Zusätzlich mussten Abstimmungen mit zahlreichen kooperierenden Akteuren durchgeführt werden. In der ersten Phase des Wettbewerbs wurden 110 Arbeiten eingereicht, von denen 19 für die zweite Phase ausgewählt wurden. Es erfolgte die Dokumentation des gesamten Verfahrens in Form von Protokollen und einem zusammenfassenden Endbericht. Schließlich wurde die Ausstellung aller Wettbewerbs-beiträge in der Nähe des Wettbewerbsgebiets organisiert und veranstaltet.</p>"
