          \ </figure>"
      - breite: 50
        html: "<p class=\"Text\">Aktivierung einer innerörtlichen Flächenreserve für den Wohnungsbau. Vorhabenbezogene planungsrechtliche Sicherung der Projektplanung für die Errichtung eines nachhaltigen und sozial gemischten Wohnquartiers mit Mietwohnungen im Geschosswohnungsbau  (406 WE) sowie ergänzenden Gewerbeeinheiten und einer Kindertagespflege</p><p>Festsetzung des vorhabenbezogenen Bebauungsplanes 13.04.2017 und Umsetzung des Bauvorhabens bis 2020.</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p class=\"Text\">Einbindung in die Konzeptentwicklung, Qualifizierung und Vertiefung des Planungskonzeptes im Rahmen einer Konzeptwerkstatt</p><p class=\"Text\">Koordinierung, Abstimmung und Berücksichtigung der Fachgutachten zu Verkehr, Immissionsschutz, Nieder-schlagsentwässerung und besonderem Artenschutz </p><p class=\"Text\">Betreuung des Durchführungsvertrags<br /></p>"
