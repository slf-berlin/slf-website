titel: "Wohnquartier Ortolfstraße 50-58, Berlin Altglienicke"
untertitel: "Vorhabenbezogener Bebauungsplan XV-29b VE"
beschreibung: "Luftfoto Realisierung Stand 2019 Aktivierung einer innerörtlichen Flächenreserve für den Wohnungsbau. Vorhabenbezogene planungsrechtliche Sicherung der Projektplanung für die Errichtung eines nachhaltigen und sozial gemischten Wohnquartiers mit Mietwohnungen im Geschosswohnungsbau (406 WE) sowie ergänzenden Gewerbeeinheiten und einer Kindertagespflege Festsetzung des vorhabenbezogenen Bebauungsplanes 13.04.2017 und Umsetzung des Bauvorhabens bis 2020. Einbindung in die Konzeptentwicklung, Qualifizierung und Vertiefung"
