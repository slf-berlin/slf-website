      - breite: 50
        html: "<p class=\"Text\">Entwicklungskonzept für ein neues inklusives Wohn-quartier mit ca. 400 Wohnungen unter dem Aspekt „Vielfalt in der Normalität„ und der Öffnung der bestehenden sozialen Einrichtungen der Annastift Leben und Lernen gGmbH.</p><p class=\"Text\">Integration von neuen unterschiedlichen Wohnnutzungen sowie Serviceeinrichtungen in ein Gesamtkonzept.</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p class=\"Text\">Vorstellung der Planungen im Rahmen einer Planungswerkstatt, Koordinierung der Fachgutachter sowie Beratung bei der Erstellung des Bebauungsplanes und Vorbereitung / Durchführung von Gutachterverfahren für Hochbaumaßnahmen.</p>"
