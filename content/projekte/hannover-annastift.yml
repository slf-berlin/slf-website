titel: "Städtebaulich-freiraumplanerisches Konzept Inklusives Wohnquartier Wülfeler Straße"
untertitel: "Niedersachsen, Hannover"
beschreibung: "Luftbild mit Plangebietsgrenze Entwicklungskonzept für ein neues inklusives Wohn-quartier mit ca. 400 Wohnungen unter dem Aspekt „Vielfalt in der Normalität„ und der Öffnung der bestehenden sozialen Einrichtungen der Annastift Leben und Lernen gGmbH. Integration von neuen unterschiedlichen Wohnnutzungen sowie Serviceeinrichtungen in ein Gesamtkonzept. Vorstellung der Planungen im Rahmen einer Planungswerkstatt, Koordinierung der Fachgutachter sowie Beratung"
