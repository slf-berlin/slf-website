titel: "Gewerbegebiet Pankow Nord"
untertitel: "Bebauungsplan XIX-53b"
beschreibung: "Plangebiet Planungsrechtliche Sicherung einer gewerblichen Entwicklung (Logistikzentrum) im Gewerbestandort Pankow-Nord (im Verfahren), Umnutzung einer ca. 29 ha großen Rieselfeldfläche unter besonderen artenschutzrechtlichen Anforderungen. Projektdaten Ort Berlin, Pankow, Ortsteil Buch und Französisch Buchholz Auftraggeber Bezirk Pankow Verfahren Bebauungsplan Zeitraum seit 2018 im Verfahren Plangebietsgröße ca. 29 ha Team Stefan Wallmann Landschaftsarchitekten, Berlin Mehr Informationen –"
