inhalt:
  - type: "text"
    html: "<p><strong>Ausgangspunkt</strong></p><ul><li>weiterhin hohe Wohnraumnachfrage bei tendenziell abnehmenden Fertigstellungszahlen im Wohnungsneubau in Berlin</li><li>kleinteilige Innenentwicklung (< 50 WE) als bedeutsamer, kontinuierlicher Beitrag zur Erreichung der Neubauziele im Land Berlin unter Berücksichtigung der Prinzipien des StEP Wohnen 2040; jährlich durchschnittlich ca. 4.000 neue Wohneinheiten in Berlin</li><li>Implementierung des informellen Planungsinstruments „Umsetzungsorientiertes Innenentwicklungskonzept“ (IEK) zur Förderung der kleinteiligen Innenentwicklung</li></ul><p><strong>Zielsetzung von umsetzungsorientierten Innenentwicklungskonzepten </strong></p><ul><li>Ermittlung und Aktivierung von Potenzialen der Innenentwicklung für Wohnungsneubau und sonstige Nutzungen (sozial, grün, gewerblichen etc.) in stadträumlich integrierten, gut erschlossenen Lagen und Identifizierung von Schlüsselgrundstücken für eine kurz- bis mittelfristige Aktivierung</li><li>pro-aktive, grundstücksübergreifende Planung durch die Bezirke jenseits vorhabenbezogener Konzepte von Eigentümern und Eigentümerinnen (ET)</li><li>frühzeitige Klärung und Berücksichtigung erforderlicher Bedarfe und vorhandener Defizite wie u.a. der sozialen und grünen Infrastruktur sowie möglicher Hemmnisse bei der Aktivierung der Potenziale</li><li>Stärkung der Identifikation seitens des Bezirks mit dem IEK aufgrund der proaktiven Bearbeitung durch das Bezirksamt und der Politik</li></ul>"
