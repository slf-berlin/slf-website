  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p><strong>Zielsetzung der Auswertung und Prozessbegleitung</strong></p><ul><li>Auswertung der vorliegenden IEK und Ableitung übertragbarer Hinweise und Empfehlungen für den weiteren Prozess</li><li>Fortführung und Etablierung des Instruments IEK im Zusammenhang mit dem StEP Wohnen 2040 und Sicherung der notwendigen Haushaltsmittel</li><li>Förderung und Verstetigung eines kontinuierlichen Informations- und Wissensaustauschs zwischen den Bezirken untereinander und mit SenStadt</li><li>Präsentation und Diskussion von Ansätzen in der Aktivierung von neuen Wohnbaupotenzialen aus anderen deutschen Städten durch Einbeziehung externer Experten und Vorstellung ausgewählter Beispiele</li></ul>"
