titel: "Umsetzungsorientierte Innenentwicklungskonzpte (IEK) Berlin"
untertitel: "Auswertung und Prozessbegleitung,2024-25"
beschreibung: "Ausgangspunkt weiterhin hohe Wohnraumnachfrage bei tendenziell abnehmenden Fertigstellungszahlen im Wohnungsneubau in Berlin kleinteilige Innenentwicklung (< 50 WE) als bedeutsamer, kontinuierlicher Beitrag zur Erreichung der Neubauziele im Land Berlin unter Berücksichtigung der Prinzipien des StEP Wohnen 2040; jährlich durchschnittlich ca. 4.000 neue Wohneinheiten in Berlin Implementierung des informellen Planungsinstruments „Umsetzungsorientiertes Innenentwicklungskonzept“ (IEK) zur Förderung der kleinteiligen"
