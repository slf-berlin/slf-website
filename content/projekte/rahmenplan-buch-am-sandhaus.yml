        html: "<p>Durchführung eines umfangreichen Beteiligungsverfahrens der Öffentlichkeit:</p><ul><li>Zaunausstellungen, Online-Umfragen und Planungswerkstätten in der Gutachter*innenphase</li><li>drei Themenwerkstätten während der Masterplanphase</li><li>eine Bürger*innenstimme im Gutachter*innengremium</li></ul>"
