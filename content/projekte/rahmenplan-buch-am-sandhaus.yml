inhalt:
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p>Das Gebiet Buch – Am Sandhaus liegt am nördlichen Rand des Bezirks Pankow im Ortsteil Buch. Entlang der Straße Am Sandhaus und auf der Fläche des ehemaligen Krankenhauses der Staatssicherheit soll ein lebendiges, städtebaulich attraktives, sozial durchmischtes und klimaangepasstes Quartier entwickelt werden. Entstehen sollen rund 2.400 bis 3.000 neue Wohnungen, ergänzt durch Kindertagesstätten und eine neue Grundschule. Das Gebiet hat für den dringend benötigten Wohnungsneubau in Berlin durch seine Größe und die Nähe zum S-Bahnhof Buch eine wichtige Bedeutung für die Stadtentwicklung. Der FNP als übergeordnete planerische Grundlage wurde 2019 dafür geändert.</p><p>Der Rahmenplan wurde am 13.06.2023 durch den Seant von berlin beschlossen und dient als Grundlage für das laufende B-Planverfahren.</p>"
