      - breite: 50
        html: "<p>Ziel ist es, im ‚Huckepack der städtebaulichen Entwicklung‘ gleichzeitig die Aufwertung dieser bisher intensiv landwirtschaftlich genutzten Landschaft umzusetzen.</p><p>Der Landschaftswasserhaushalt soll gestärkt, die Biodiversität gesteigert, Wald vermehrt und die ausgeräumte Offenlandschaft strukturreicher werden.</p><p>Die Eigenarten der Landschaft werden zum Ausgangspunkt, um sie neu zu gestalten. Wertvolle Biotopstrukturen werden gesichert, bestehende, kulturell geprägte Strukturen einbezogen, die Landwirtschaft wird von intensiv auf extensiv umgestellt. Es findet eine Transformation statt, die sich aus den Eigenarten dieses Raumes ableitet und diese weiterentwickelt.</p>"
  - type: "text"
    html: "<p>Arbeitsschritte:</p><ul><li>Bestandserfassung und Auswertung der Situation vor Ort, vorliegender Planungen und sonstiger Vorhaben</li><li>Abstimmungen mit Fachverwaltungen (Senat, Bezirk) zu Rahmenbedingungen einer zukünftigen Entwicklung</li><li>Vorbereitung und Durchführung eines diskursiven, städtebaulichen Gutachter*innenverfahrens mit drei ausgewählten Planungsteams zur Entwicklung einer Vorzugsvariante über drei Arbeitsphasen</li><li>Erarbeitung eines übergeordneten Rahmenplans für das Gesamtgebiet (ca. 190 ha) mit Integration der überarbeiteten städtebaulichen Vorzugsvariante (Masterplan) einschließlich Maßnahmenkonzept</li><li>Rahmenplan als Grundlage für das anschließende B-Planverfahren</li></ul>"
