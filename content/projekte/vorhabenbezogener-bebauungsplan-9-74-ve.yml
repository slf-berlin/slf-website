        html: "<img width=\"860\" height=\"609\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/08/dop-2019-gb-1-860x609.jpg\" class=\"attachment-large size-large wp-image-3924\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/08/dop-2019-gb-1-860x609.jpg 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/08/dop-2019-gb-1-580x411.jpg 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/08/dop-2019-gb-1-768x544.jpg 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/08/dop-2019-gb-1-1536x1088.jpg 1536w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/08/dop-2019-gb-1-2048x1451.jpg 2048w\" sizes=\"(max-width: 860px) 100vw, 860px\" />"
      - breite: 66
        html: "<p>Veranlassung für die Planaufstellung ist ein geplantes Vorhaben der Berliner Verkehrsbetriebe (BVG). Die Erforderlichkeit ergibt sich aus der von der BVG angestrebten Elektrifizierung ihrer Busflotte. Diese erfordert eine entsprechende Anpassung und Entwicklung der Betriebshofinfrastruktur. Neben der Umrüstung vorhandener Betriebshofstandorte sieht die Umsetzungsstrategie der BVG auch die Errichtung neuer Betriebshöfe im Berliner Stadtgebiet vor. In diesem Rahmen ist die Errichtung des neuen Betriebshofverbunds im Bezirk Treptow-Köpenick, Ortsteil Oberschöneweide beabsichtigt.</p>"
