    sizes: "(max-width: 860px) 100vw, 860px"
    caption: "Lageplan: Gebäude und Freiflächen"
  - type: "text"
    html: "<p>Ziel des Planverfahrens ist die planungsrechtliche Sicherung und nachbarschaftsverträgliche Einbindung der innerhalb des Plangebiets vorgesehenen baulichen Anlagen und betrieblichen Nutzungen, die im Wesentlichen eine Betriebswerkstatt sowie Aufstell- und Ladeflächen für ausschließlich Elektrobusse umfassen. Die geplanten Nutzungen und Anlagen sind auf der Grundlage von § 34 BauGB nicht entwicklungsfähig. Für die angestrebte städtebauliche Entwicklung und Ordnung des Plangebiets ist die Aufstellung eines Bebauungsplans erforderlich.</p>"
