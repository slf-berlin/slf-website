titel: "Städtebauliche Variantenentwicklung Konversionsfläche Schwanebecker Chaussee"
untertitel: "Brandenburg, Bernau bei Berlin"
beschreibung: "Vernetzung Lindow Transformation einer militärischen Konversionfläche mit ca. 38 ha in ein Wohnquartier für ca. 3.800 Einwohner mit Standorten für Grundschule und Kindertagesstätten sowie ergänzender Büro-, Einzelhandels- und Dienstleistungsflächen. Gliederung des neuen Quartiers in verschiedene Nachbarschaften mit Bezug zu denkmalgeschützen Gebäudebestand und durch Ausbildung einer grünen Fuge mit Park und Schulstandort. Vernetzung mit Ortsteil Lindow"
