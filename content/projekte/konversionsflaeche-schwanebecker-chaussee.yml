  - type: "spalten"
    spalten:
      - breite: 50
        html: "<figure>

          \ <img width=\"448\" height=\"580\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/01/vernetzung-lindow.jpg\" class=\"attachment-large size-large wp-image-437\" alt=\"\" /> <figcaption>Vernetzung Lindow</figcaption>

          \ </figure>"
      - breite: 50
        html: "<p class=\"Text\">Transformation einer militärischen Konversionfläche mit ca. 38 ha in ein Wohnquartier für ca. 3.800 Einwohner mit Standorten für Grundschule und Kindertagesstätten sowie ergänzender Büro-, Einzelhandels- und Dienstleistungsflächen.</p><p class=\"Text\">Gliederung des neuen Quartiers in verschiedene Nachbarschaften mit Bezug zu denkmalgeschützen Gebäudebestand und durch Ausbildung einer grünen Fuge mit Park und Schulstandort.</p><p>Vernetzung mit Ortsteil Lindow und angrenzenden Siedlungsgebieten sowie der Altstadt von Bernau über differenzierte Wegeverbindungen und Aufnahme baulicher Strukturen.</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p>Ausarbeitung verschiedener Wohntypologien mit dem Schwerpunkt Lärmschutz und sonstiger Schallschutzmaßnahmen aufgrund der stark belasteten Situation zwischen Autobahn, Bahnstrecke und Landesstraße.</p>"
