titel: "Ortsteilentwicklungskonzept in Leipzig"
untertitel: "Knautkleeberg - Knauthain, Stadtbezirk Südwest"
beschreibung: "Das stetige Einwohnerwachstum in Leipzig führt dazu, dass Bauflächen in den inner städtisch gelegenen Gebieten knapper werden. Neben den Lückenschließungen in den inneren Stadtgebieten und dem Abschluss laufender Gebietsentwicklungen wird deutlich, dass es insbesondere für den individuellen Wohnungsbau Bedarfe in den äußeren Ortsteilen gibt. Gleichzeitig werden seitens der aktuellen Einwohnerschaft in den äußeren Ortsteilen bereits"
