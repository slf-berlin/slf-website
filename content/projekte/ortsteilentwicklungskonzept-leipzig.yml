inhalt:
  - type: "text"
    html: "<p>Das stetige Einwohnerwachstum in Leipzig führt dazu, dass Bauflächen in den inner städtisch gelegenen Gebieten knapper werden. Neben den Lückenschließungen in den inneren Stadtgebieten und dem Abschluss laufender Gebietsentwicklungen wird deutlich, dass es insbesondere für den individuellen Wohnungsbau Bedarfe in den äußeren Ortsteilen gibt.<br />Gleichzeitig werden seitens der aktuellen Einwohnerschaft in den äußeren Ortsteilen bereits jetzt ergänzende soziokulturelle und infrastrukturelle Bedarfe, wie zum Beispiel seniorengerechten Wohnformen, Verbesserung der Nahversorgungsmöglichkeiten und Erweiterungen von Sportfreiflächen signalisiert.<br />Darüber hinaus kommt den vorhandenen Freiraumstrukturen zukünftig eine wachsende Bedeutung für die Frisch- und Kaltluftentstehung sowohl für diesen Ortsteil als auch für die Gesamtstadt zu. Heute haben diese Flächen eine wichtige Funktion als landwirtschaftliche Produktionsflächen.</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<figure>

          \ <img width=\"580\" height=\"671\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/04/kk-analyse-potenziale-a3.gif\" class=\"attachment-large size-large wp-image-1409\" alt=\"\" /> <figcaption>Analyse Potenziale</figcaption>

          \ </figure>"
      - breite: 50
        html: "<figure>

          \ <img width=\"580\" height=\"669\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/04/kk-analyse-herausforderungen-a3.gif\" class=\"attachment-large size-large wp-image-1408\" alt=\"\" /> <figcaption>Analyse Herausforderungen</figcaption>

          \ </figure>"
  - type: "text"
    html: "<p>Vor diesem Hintergrund wird ein Ortsteilentwicklungskonzept für den Ortsteil Knautkleeberg-Knauthain erarbeitet.</p><p>In einem gemeinsamen, kooperativen Prozess mit den Bürgerinnen und Bürgern vor Ort sollen die Grundlagen der zukünftigen Entwicklung des Ortsteils diskutiert werden. Dabei wird herausgearbeitet, was unter Berücksichtigung des gesamtstädtischen Kontextes für den Ortsteil als Entwicklungsrichtung angemessen und zukunftsfähig ist. <br /><br />Während des gesamten Erarbeitungsprozesses werden verschiedene Formate zur Information und Beteiligung stattfinden. Die Beteiligungsformate sollen unterschiedlichen Zielgruppen, wie zum Beispiel Kinder und Jugendliche, Pendlerinnen und Pendler oder Senioreninnen und Senioren, ansprechen.</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<figure>

          \ <img width=\"848\" height=\"739\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/04/00-leitbild-kk-130421-final-e1625671711999.gif\" class=\"attachment-large size-large wp-image-1403\" alt=\"\" /> <figcaption>Leitbild</figcaption>

          \ </figure>

          <figure>

          \ <img width=\"1000\" height=\"1067\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/06/20221024-rahmenplan-kk2.jpg\" class=\"attachment-large size-large wp-image-3990\" alt=\"\" /> <figcaption>Rahmenplan</figcaption>

          \ </figure>"
      - breite: 50
        html: "<figure>

          \ <img width=\"1000\" height=\"1066\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/06/20221024-oek-massnahmenplan-kk-final2.jpg\" class=\"attachment-large size-large wp-image-3989\" alt=\"\" /> <figcaption>Maßnahmenplan</figcaption>

          \ </figure>"
  - type: "text"
    html: "<p>Aufbauend auf den vorangegangenen Arbeitsschritten der Bestandsanalyse erfolgte die Leitbildentwicklung, bestehend aus dem räumlichen Leitbild und dem so genannten Zielsystem. Das räumliche Leitbild ist die plangraphische Darstellung der wichtigsten Entwicklungsziele. Das Zielsystem fasst die Entwicklungsziele für den Ortsteil zusammen. </p><p>Der Rahmenplan stellt das Grundgerüst für die nachfolgende Planungs- und Maßnahmenebene dar. Im Rahmenplan werden die bereits im Leitbild verankerten räumlichen Schwerpunktbereiche durch integrierte Maßnahmenvorschläge aus den Handlungsfeldern Daseinsvorsorge/Gemeinwesen, Siedlungsstruktur/Städtebau, Landschaft/Grünraum sowie Verkehr/ Mobilität unterlegt. </p><p>Der Rahmenplan gibt Orientierung für das weitere Vorgehen und Arbeiten mit dem OEK und basiert auf den Ergebnissen des Beteiligungsprozesses.</p><p>Das Handlungs- und Maßnahmenkonzept umfasst den Plan „Handlungs- und Maßnahmenplan“ sowie eine Tabelle mit den Handlungsfeldern und Maßnahmen. </p>"
  - type: "spalten"
    spalten:
      - breite: 33
        html: "<p>Um die generalisierten Darstellungen des Rahmenplans punktuell zu konkretisieren, wurden in Abstimmung mit der Auftraggeberin zwei Vertiefungsbereiche für städtebaulich-freiraumplanerische Testentwürfe (je zwei Varianten) in kleineren Maßstäben gewählt: </p>"
