      - breite: 50
        html: "<p class=\"Text\">Nachhaltige Entwicklung eines Stadtquartiers mit rund 350 geplanten WE und rund 140 bestehenden WE auf einem ehemals militärisch genutzten Areal im Ortsteil Lehnitz auf Grundlage des Bebauungsplan Nr.133. </p><p class=\"Text\">Planung der sozialen Infrastruktur und Verbesserung der Wegeverbindung zum S-Bahnhof Lehnitz. Die Planung erfolgt durch die Oberhavel Holding, Besitz- und Verwaltungsgesellschaft mbH.</p><p>Umsetzung des städtebaulichen Konzepts von Stadt Land Fluss.</p><p>In Zusammenarbeit mit Stefan Wallmann Landschafts-architekten, Berlin.</p>"
