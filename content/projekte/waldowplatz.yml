          \ </figure>"
      - breite: 50
        html: "<p>Erstellung vier verschiedener Varianten und zwei Vorzugsvarianten eines Konzeptes für die stufenweise Entwicklung eines Schulstandortes in Berlin-Oberschöneweide.</p><p>Ergänzung um weitere sozialer Infrastruktur – eine Kindertagesstätte und eine Jugendfreizeiteinrichtung.</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p>Etablierung einer gemischten Nutzungsstruktur mit dem Schwerpunkt Wohnen und Förderung gemischter Wohntypologien in allen Varianten zur sozialen Mischung der Bewohnerschaft und zur Attraktivität des Quartiers.   </p><p>Schaffung attraktiver öffentlich nutzbarer Freiräume (u.a. Spielplätze, Quartiersplatz, Grünflächen) und einer nachhaltigen Quartiersentwicklung.</p>"
