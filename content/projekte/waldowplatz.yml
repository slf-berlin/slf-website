titel: "Waldowplatz Treptow-Köpenick"
untertitel: "Städtebaulich - freiraumplanerische Konzeptstudie, 2019"
beschreibung: "Konsensvariante Erstellung vier verschiedener Varianten und zwei Vorzugsvarianten eines Konzeptes für die stufenweise Entwicklung eines Schulstandortes in Berlin-Oberschöneweide. Ergänzung um weitere sozialer Infrastruktur – eine Kindertagesstätte und eine Jugendfreizeiteinrichtung. Etablierung einer gemischten Nutzungsstruktur mit dem Schwerpunkt Wohnen und Förderung gemischter Wohntypologien in allen Varianten zur sozialen Mischung der Bewohnerschaft und zur Attraktivität des Quartiers. Schaffung"
