          \ </figure>"
      - breite: 50
        html: "<p>Analyse der aktuellen Situation bzw. der räumlichen Struktur und Ausprägung des Tourismus in Berlin auf drei Maßstabsebenen mit entsprechend differenzierten Darstellungen: Gesamtstadt, Innere Stadt sowie auszuwählende Teilräume</p><p>Auswertung der relevanten vorliegenden Erhebungen, Konzepte und Planungen insbesondere des aktuell in Aufstellung befindlichen Tourismuskonzeptes Berlin</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p>Erfassung und Übernahme in GIS von bestehenden touristischen Zielorten, Services und beanspruchten öffentlichen Räumen.</p><p>Ableitung von konkretisierten Handlungsansätzen  für die einzelnen Raumtypen insbesondere in der Verantwortung öffentlicher Akteure.</p>"
