inhalt:
  - type: "spalten"
    spalten:
      - breite: 33
        html: "<p>Die Stadt Fürstenwalde/Spree möchte mit der Nachnutzung der historischen Aufbauschule einen Campus für Gesundheit und Bildung in Ergänzung mit generationsübergreifendes Wohnen einen neuen und adäquaten Stadteingang West schaffen. </p><p>Die besondere Lage am Stadtpark mit direkter Verbindung zum Bahnhof und der Innenstadt sowie die Nähe zur Spree und dem Sportpark ermöglicht eine gesamteinheitliche Vernetzung und schaffen für Nutzer, Bewohner und Besucher verschiedene, teilweise sich überlagernde Loops (attraktive Wegeverbindungen für Fußgänger und Radfahrer mit Programmpunkten).</p>"
