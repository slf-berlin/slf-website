      - breite: 66
        html: "Der denkmalgeschützte Gebäudekomplex der Aufbau-schule stellt den Ausgangspunkt für die künftige Entwicklung des Areals dar. Hier entsteht der neue Campusplatz welcher den Auftakt für das gesamte Campus-Gelände bildet und einzelne Quartiere mit unterschiedlichen Nutzungsschwerpunkten umfasst.<br />Das westliche Campusquartier bietet um den Genera-tionen-Park eine Mischung von sozialen Infrastrukturein-richtungen wie Bildungseinrichtung der Aufbauschule, dem Erweiterungsbau mit Mensa, der Kita mit Nachbar- schaftszentrum, dem Studentenwohnen, Boardinghouse, Wohnen im Wald und einer Quartiersgarage.<br /><br />In Ergänzung bietet das östliche Campusquartier Angebote des Gesundheitswesens wie dem Pflege-zentrum mit dazugehörigem betreuten Wohnen sowie dem medizinischen Versorgungszentrum mit Sport- <br />und Fitnessangeboten sowie Läden im EG entlang der <br />Dr.-Wilhelm-Külz-Straße. <p>Der Campusplatz ist Begegnungsort. Er stellt den Mittelpunkt der baulichen Entwicklung dar und öffnet sich zum Landschaftsraum Spree. Die Neubauten bleiben mit maximal vier Geschossen unterhalb der Firsthöhe der Seitenflügel der Aufbauschule. Somit bleibt sie auch zukünftig das prägnante, identitätsstiftende Gebäude <br />des Stadteingangs.</p>"
