titel: "Städtebauliches Werkstattverfahren Rathausblock Dragonerareal"
untertitel: "Berlin, Friedrichshain-Kreuzberg, 2019-2020"
beschreibung: "Lageplan EG Das 4,7 ha große Grundstück des Dragonerareals und angrenzende Grundstücksflächen sind wichtige Potenzialflächen für die Entwicklung eines inner-städtischen Quartiers für Wohnen, Gewerbe, Kultur und soziale Einrichtungen. Durch die Übertragung des Grundstücks in das Landeseigentum Berlins bietet sich die Chance für die kooperative, partizipative und gemeinwohlorientierte Entwicklung eines neuen Quartiers im Rahmen eines Werkstattverfahrens,"
