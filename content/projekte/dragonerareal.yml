    spalten:
      - breite: 50
        html: "<figure>

          \ <img width=\"860\" height=\"825\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/02/lageplan-860x825.jpg\" class=\"attachment-large size-large wp-image-492\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/02/lageplan-860x825.jpg 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/02/lageplan-580x556.jpg 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/02/lageplan-768x737.jpg 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/02/lageplan-1536x1473.jpg 1536w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/02/lageplan.jpg 1564w\" sizes=\"(max-width: 860px) 100vw, 860px\" /> <figcaption>Lageplan EG</figcaption>

          \ </figure>"
      - breite: 50
        html: "<p>Das 4,7 ha große Grundstück des Dragonerareals und angrenzende Grundstücksflächen sind wichtige Potenzialflächen für die Entwicklung eines inner-städtischen Quartiers für Wohnen, Gewerbe, Kultur und soziale Einrichtungen. Durch die Übertragung des Grundstücks in das Landeseigentum Berlins bietet sich die Chance für die kooperative, partizipative <br />und gemeinwohlorientierte Entwicklung eines neuen Quartiers im Rahmen eines Werkstattverfahrens, in dem eine konsensuale Entscheidung angestrebt wird, die durch alle Kooperationspartner (Land, Bezirk, WBM, BIM, Vernetzungstreffen Rathausblock und Forum Rathaus- block) gleichermaßen vertreten und umgesetzt werden soll. Innerhalb eines klaren städtebaulichen Gerüstes und unter Einbeziehung und Transfomation der vorhandenen besonderen Situationen kann eine feldweise durchgeführte, prozessorientierte und situative</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p>Herangehensweise die je nach Nutzergruppe spezifischen Ansprüche ermöglichen und die Bildung eines alltäglichen und doch besonderen Stadtbausteins sicher stellen. Ziel dieses Werkstatt-Verfahrens ist die gemeinsame Erarbeitung eines städtebaulichen Konzepts für das Plangebiet, das aus dem Dragonerareal, dem Grundstück des Finanzamts, dem Rathausgrundstück und dem Grundstück Obentrautstraße 31 besteht. Dabei wird eine konsensuale Entscheidung angestrebt, die durch alle Kooperationspartner gleichermaßen vertreten und umgesetzt werden soll.</p>"
