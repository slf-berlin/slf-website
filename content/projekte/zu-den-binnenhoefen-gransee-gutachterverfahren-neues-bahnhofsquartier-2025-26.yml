          \ </figure>"
  - type: "text"
    html: "<p>Für die Umsetzung ist eine bedarfsgerechte Entwicklung in vier Phasen vorgesehen, die durch eine dauerhafte „Info-Box“ am Holzhackschnitzelwerk begleitet wird, um die Bevölkerung frühzeitig in den Planungsprozess einzubinden. Ein innovativer Baustein der Mobilität ist die geplante Quartiersgarage, die als zentraler „Mobility-Hub“ mit Paketstation fungiert und auf ihrem Dach einen öffentlich zugänglichen Aktivplatz für Sport und Bewegung bietet. Gleichzeitig sichern Grauwasser-Aufbereitungssysteme und Pflanzenkläranlagen in den Wohnhöfen eine zukunftsweisende ökologische Bewirtschaftung des Gebiets.</p>"
