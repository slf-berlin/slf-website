inhalt:
  - type: "text"
    html: "<p class=\"Pa0\">Das neue Bahnhofsquartier Gransee entwickelt sich auf einem ehemaligen Feld zu einem nachbarschaftlichen Wohnquartier. Angelehnt an die Wohnblöcke in der Altstadt wird der Granseer Maßstab im Entwurf neu interpretiert. Es entstehen Hofstrukturen, die unterschiedliche Wohnformen um einen gemeinschaftlichen Innenhof gruppieren. Das Freiraumangebot in der Stadt wird durch einen Park erweitert, der sich quer durch das neue Quartier zieht. </p><p class=\"Pa0\">Die neuen Wohnhöfe entstehen in einer großen und in einer kleinen Variante jeweils mit Anschluss an einen Freiraum – den neuen Quartierspark bzw. den Landschaftsraum. Alle Höfe bestehen aus je drei Wohngebäudetypen und einem Schuppen/Carport und werden von innen erschlossen. Die Baufelder mit der Bestandsbebauung an der Straße des Friedens werden mit den Wohnbautypen ebenfalls zu gemeinschaftlichen Höfen ergänzt. </p><p class=\"Pa0\">Der neu entstehende Quartierspark bindet mit seiner Durchwegung den Bahnhofsvorplatz an das Quartier an. Er bietet auch für die Bestandsbewohnerschaft einen besonderen Mehrwert als Treffpunkt für verschiedene Altersgruppen, schafft Kommunikationsorte zwischen alten und neuen Anwohner:innen und besitzt eine hohe Bedeutung bezüglich Klimaanpassung, Biodiversität und den Umgang mit (Regen-)Wasser. Darüber hinaus werden auch Kleingärten, Mieter:innengärten sowie private Hausgärten und Balkone/Laubengänge Teil der Grün- und Freiraumversorgung. </p>"
