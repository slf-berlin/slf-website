          \ </figure>"
      - breite: 66
        html: "<p style=\"font-weight: 400;\">Das neue Quartier soll autoarm entwickelt werden und wird durch eine Ringerschließung angebunden. Diese wird als Misch-verkehrsfläche für alle Verkehrsteilnehmenden ausgebildet.</p><p style=\"font-weight: 400;\">Im Bereich zwischen den Höfen weitet und verjüngt sich der öffentliche Raum und bietet somit Räume zum Aufenthalt, für Zusammenkünfte und Aktivitäten.</p><p>Die soziale Nachhaltigkeit des Quartiers spiegelt sich in einem differenzierten Wohnungsmix wider, der gezielt auf die Bedürfnisse verschiedener Lebensphasen reagiert. Während barrierefreie 1- bis 2-Zimmer-Wohnungen und betreute Wohngruppen am neuen Quartiersplatz Angebote für ältere Menschen schaffen, bieten Punkthäuser und Reihenhäuser flexiblen Raum für Familien und Mehrgenerationenwohnen. Ergänzt wird diese Infrastruktur durch kleinteilige gewerbliche Einheiten in den Eingangsbereichen, die Raum für Nutzungen wie eine Physiotherapiepraxis oder gastronomische Angebote am Bahnhof bieten.</p>"
