    caption: "Leitidee"
  - type: "text"
    html: "<p>Städtebauliche und freiräumliche Entwicklung eines Wohnquartiers mit mind. 600 WE unter Berücksichtigung der in der direkten Nachbarschaft vorhandenen und schützenswerten Biotope. Die ca. 8,5 ha große, bisher gewerblich genutzte Fläche (Tetra Pak, Underberg, ALDI) befindet sich an der Landesgrenze Berlins, Bezirk Reinickendorf, im Ortsteil Heiligensee.</p>"
