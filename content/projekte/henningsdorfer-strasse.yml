  - type: "spalten"
    spalten:
      - breite: 50
        html: "<figure>

          \ <img width=\"580\" height=\"466\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/01/181216_pikto-erschliessung-e1608289345750.jpg\" class=\"attachment-large size-large wp-image-479\" alt=\"\" /> <figcaption>Erschließung und Vernetzung </figcaption>

          \ </figure>"
      - breite: 50
        html: "<p>Ziel ist der Bau eines zukunftsweisenden Wohnquartiers, das in innovativer und wirtschaftlicher Form neuen Wohn- und Lebensraum in Einklang mit den angrenzenden hochwertigen Naturräumen und den Ortsteilstrukturen von Heiligensee schafft. Die Planung als verkehrsarmes Quartier und die Integration eines neuen mehrfachgenutzten ALDI-Standortes mit Wohnen und Dienstleistungen sind wichtige Ziele.</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p class=\"Text\">Das entwickelte städtebaulich-freiraumplanerische Konzept sieht die Verzahnung des neuen Wohnquartiers mit der prägenden Landschaft der Umgebung vor. </p><p class=\"Text\">Durch die freistehende Anordnung der Mehrfamilienhäuser  durchdringt der Naturraum das Quartier, es entstehen Blick- und Wegebeziehungen zu den Wald- ,Biotop- und Wasserflächen. </p><p class=\"Text\">Das differenzierte Angebot an Wohnformen wird durch die am Quartiersplatz angeordneten Gemeinbedarfseinrichtungen, wohnbezogene Dienstleistungen und dem Supermarkt ergänzt.</p>"
      - breite: 50
        html: "<figure>

          \ <img width=\"580\" height=\"481\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/01/181216_pikto_freiraum-e1608286016476.jpg\" class=\"attachment-large size-large wp-image-478\" alt=\"\" /> <figcaption>Freiraumstruktur</figcaption>

          \ </figure>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<figure>

          \ <img width=\"860\" height=\"801\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/03/typologien-nutzung-e1608289757425-860x801.jpg\" class=\"attachment-large size-large wp-image-1333\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/03/typologien-nutzung-e1608289757425-860x801.jpg 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/03/typologien-nutzung-e1608289757425-580x540.jpg 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/03/typologien-nutzung-e1608289757425-768x715.jpg 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/03/typologien-nutzung-e1608289757425-1536x1430.jpg 1536w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2020/03/typologien-nutzung-e1608289757425.jpg 1815w\" sizes=\"(max-width: 860px) 100vw, 860px\" /> <figcaption>Bebauungstypologien</figcaption>

          \ </figure>"
      - breite: 50
        html: "<p>Ziel ist der Bau eines zukunftsweisenden Wohnquartiers, das in innovativer und wirtschaftlicher Form neuen Wohn- und Lebensraum in Einklang mit den angrenzenden hochwertigen Naturräumen und den Ortsteilstrukturen von Heiligensee schafft. Die Planung als verkehrsarmes Quartier und die Integration eines neuen mehrfachgenutzten ALDI-Standortes mit Wohnen und Dienstleistungen sind wichtige Ziele.</p>"
