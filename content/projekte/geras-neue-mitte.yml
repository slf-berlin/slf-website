          \ </figure>"
      - breite: 50
        html: "<p class=\"Text\">Erstellung von zwei Bebauungsplänen auf Grundlage des städtebaulichen Konzeptes „Rahmenplan plus“ von yellow z Berlin.</p><p class=\"Text\">Durch den Verein Ja-für Gera e.V. und die Stadt Gera wurden ab 2014 mit einem intensiven Bürgerbeteiligungsprozess erste Nutzungsideen und Entwicklungsansätze für das innerstädtische Planungsgebiet diskutiert.</p><p class=\"Text\">Aufgrund des vielfältigen und innovativen Beteiligungsprozesses ist das Projekt zur Revitalisierung der Innenstadt Teil der IBA Thüringen 2023.</p><p class=\"Text\">Durch eine planungsrechtliche Sicherung soll die Grundlage für eine Umsetzung diese Planungsziele und die Aktivierung von Investitionen geschaffen werden.</p>"
