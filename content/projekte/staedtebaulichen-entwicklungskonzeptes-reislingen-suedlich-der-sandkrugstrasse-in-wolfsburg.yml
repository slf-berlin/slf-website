  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p>Nach einer umfangreichen Standortanalyse auf unterschiedlichen Maßstabsebenen, sowie Auswertungen dieser in Form einer SWOT-Analyse (engl. Akronym für Strengths (Stärken), Weaknesses (Schwächen), Opportunities (Chancen) und Threats (Risiken)), erfolgt die Erarbeitung von zwei unterschiedlichen städtebaulichen Bebauungs- und Erschließungsvarianten als gemeinsame Diskussionsbasis für Stadt und Investoren, sowie spätere Grundlage eines Bebauungsplans.</p><p>Ergänzt wird die ca. 21 ha große Hauptentwurfsfläche durch zwei kleinere Entwick-lungsbereiche östlich der Zollstraße. Für die nordöstliche Teilfläche ist eine gewerbliche Nutzung für kleinteilige Handwerksbetriebe vorgesehen. Der südöstliche Bereich soll ebenfalls als Wohnfläche entwickelt werden.</p>"
