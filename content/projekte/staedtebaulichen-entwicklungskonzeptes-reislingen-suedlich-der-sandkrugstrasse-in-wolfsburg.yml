titel: "Wohnquartier Reislingen – südlich der Sandkrugstraße, Wolfsburg"
untertitel: "Städtebauliches Entwicklungskonzept, 2023"
beschreibung: "Im Osten der Stadt Wolfsburg, südlich des alten Kerns des Stadtteils Reislingen befindet sich das bis Mitte der 2010 er-Jahre überwiegend gewerblich genutzte ca. 28 ha große Entwurfsgebiet. Im Zuge der Wohnbauinitiative sollen hier zukünftig zentrumsnah Flächen für den Wohnungsbau ausgewiesen werden. Ziel des städtebaulichen Entwurfs ist die Erarbeitung einer Siedlungsstruktur, welche kleinteiligen Geschosswohnungsbau berücksichtigt,"
