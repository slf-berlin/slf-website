inhalt:
  - type: "spalten"
    spalten:
      - breite: 33
        html: "<p>Im Osten der Stadt Wolfsburg, südlich des alten Kerns des Stadtteils Reislingen befindet sich das bis Mitte der 2010 er-Jahre überwiegend gewerblich genutzte ca. 28 ha große Entwurfsgebiet. Im Zuge der Wohnbauinitiative sollen hier zukünftig zentrumsnah Flächen für den Wohnungsbau ausgewiesen werden. </p><p>Ziel des städtebaulichen Entwurfs ist die Erarbeitung einer Siedlungsstruktur, welche kleinteiligen  Geschosswohnungsbau berücksichtigt, jedoch die Proportionen der dörflichen Siedlungsstruktur erhalten bzw. von der Dichte des Altortes in dem künftigen Gebiet nicht zu stark abweichen soll.</p>"
