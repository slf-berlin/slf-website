  - type: "text"
    html: "<p style=\"font-weight: 400;\">Abschließend entstanden zwei Entwurfsvarianten, die sich in kleinerem Maßstab  in Erschließung, Freiraum und Typologieverteilung unterschieden.<br />Ergänzend zum Konzept auf der Hauptentwurfsfläche und den zwei Teilbereichen, wurden zudem je Variante eine Bebauungsalternative für die künftige Überplanung der bestehenden Gewerbehalle im Westen erstellt.</p>"
