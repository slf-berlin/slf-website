  - type: "spalten"
    spalten:
      - breite: 66
        html: "<figure>

          \ <img width=\"1152\" height=\"1068\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/02/2preis-seite-1-1.png\" class=\"attachment-full size-full wp-image-3476\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/02/2preis-seite-1-1.png 1152w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/02/2preis-seite-1-1-580x538.png 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/02/2preis-seite-1-1-860x797.png 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/02/2preis-seite-1-1-768x712.png 768w\" sizes=\"(max-width: 1152px) 100vw, 1152px\" /> <figcaption>Freiraumband</figcaption>

          \ </figure>"
      - breite: 33
        html: "<p class=\"Text\">Der Entwurf zitiert den historischen Stadtgrundriss am Georg-Stock-Platz. Ziel ist es, bestehende Wegeverbindungen zu stärken und historische Bezüge wieder herauszuarbeiten. Es geht darum die Identität des Platzes und des gesamten Stadtteils zu stärken. Auf die derzeitig heterogene Situation vor Ort reagiert der Entwurf mit einer eindeutigen Stadt- und Freiraumstruktur welcher verlorengegangen historische Bezüge wieder herstellt und neue stadträumliche Verbindungen schafft.</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p class=\"Text\">Die neuen Gebäude vom Haus am Platz (Wohnhaus mit ca. 30 Wohnungen und einer aktiven Erdgeschosszone) und dem Haus der Jugend (Jugendzentrum) komplettieren den erhaltenswerten und platzflankierenden Baumbestand und schaffen so einen baulich und vegetativ gefassten Quartiersplatz. Im westlichen Platzbereich wird die Straßenprofilierung der Straße Kirchweg aufgehoben und niveaugleich zum Quartiersplatz gepflastert. Damit wird die Blockrandbebauung am Kirchweg zur westlichen Platzkante des Quartiersplatzes. </p>"
      - breite: 50
        html: "<figure>

          \ <img width=\"860\" height=\"501\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/02/20211218-204712-resized-860x501.jpg\" class=\"attachment-large size-large wp-image-3460\" alt=\"Modellfoto Kassel\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/02/20211218-204712-resized-860x501.jpg 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/02/20211218-204712-resized-580x338.jpg 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/02/20211218-204712-resized-768x448.jpg 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/02/20211218-204712-resized-1536x895.jpg 1536w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/02/20211218-204712-resized-2048x1194.jpg 2048w\" sizes=\"(max-width: 860px) 100vw, 860px\" /> <figcaption>Modellfotos @Kassel</figcaption>

          \ </figure>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p class=\"Text\">Ein nach Norden verlaufender Verbindungsweg führt vom zentralen Quartiersplatz, vorbei ein einer grünen Ruhe Oase, dem „kleinen“ Georg-Stock-Platz direkt zum Balkon an der Drusel. Hier bleiben die sehr steilen Böschungsbereiche des Zulaufs zur Fulda unberührt. Vielmehr ragt ein „Druselbalkon“ über den Wasserlauf und ermöglicht so einen offenen, freien und vor allem sicheren Blick auf, über und in den Flusslauf.</p>"
