titel: "Flächennutzungsplan Gemeinde Schorfheide"
untertitel: "Neuaufstellung Flächennutzungsplan, seit 2019"
beschreibung: "Die Gemeinde Schorfheide mit den neun Ortsteilen Altenhof, Böhmerheide, Eichhorst, Finowfurt, Groß Schönebeck, Klandorf, Lichterfelde, Schluft und Werbellin besteht seit dem 26.10.2003 und wurde durch Zusammenlegung der ehemaligen Gemeinden Groß Schönebeck (Schorfheide) und Finowfurt neugebildet. Sie beabsichtigt aufgrund der Neuausrichtung ihrer städtebaulichen Zielstellungen und zur langfristigen Sicherung einer geordneten und nachhaltigen räumlichen Entwicklung ihren Flächennutzungsplan neu"
