inhalt:
  - type: "spalten"
    spalten:
      - breite: 33
        html: "<p>Die Gemeinde Schorfheide mit den neun Ortsteilen Altenhof, Böhmerheide, Eichhorst, Finowfurt, Groß Schönebeck, Klandorf, Lichterfelde, Schluft und Werbellin besteht seit dem 26.10.2003 und wurde durch Zusammenlegung der ehemaligen Gemeinden Groß Schönebeck (Schorfheide) und Finowfurt neugebildet. Sie beabsichtigt aufgrund der Neuausrichtung ihrer städtebaulichen Zielstellungen und zur langfristigen Sicherung einer geordneten und nachhaltigen räumlichen Entwicklung ihren Flächennutzungsplan neu aufzustellen.</p>"
      - breite: 66
        html: "<img width=\"580\" height=\"496\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/08/bersicht-ortsteile-580x496.jpg\" class=\"attachment-medium size-medium wp-image-3912\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/08/bersicht-ortsteile-580x496.jpg 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/08/bersicht-ortsteile.jpg 767w\" sizes=\"(max-width: 580px) 100vw, 580px\" />"
  - type: "text"
    html: "<p>Mit der Neuaufstellung des FNP sollen veränderte Entwicklungsziele und veränderte Rahmenbedingungen in den Bereichen Wohnen, Wirtschaft, Umwelt und Verkehr in der vorbereitenden Bauleitplanung Berücksichtigung finden. Darüber hinaus haben sich gesetzliche und inhaltlichen Rahmenbedingungen auf den Ebenen der räumlichen Planung geändert.</p><p>Mit der Neuaufstellung soll die Möglichkeit genutzt werden, die an die zukünftige Raumnutzung gestellten Ansprüche zu erfüllen und zum Ausgleich zu bringen. Dabei müssen insbesondere die Wohnbauflächen und Gewerbeflächenentwicklung, aber auch die Flächen für Gemeinbedarf, Freizeit und Tourismus oder Einzelhandel und die Flächenanforderungen für die regenerative Energiegewinnung überprüft werden und an aktuelle sich abzeichnende zukünftige Entwicklungen angepasst werden. Hinzu kommen geänderte Ansprüche von Fachplanungen wie etwa der Verkehrsplanung oder des Umwelt- und Naturschutzes.</p>"
