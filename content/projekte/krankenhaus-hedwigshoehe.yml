titel: "Erweiterung Krankenhaus Hedwigshöhe"
untertitel: "Vorhabenbezogener Bebauungsplan XV-37ea-1 VE"
beschreibung: "Lageplan Fortführung der ortsbezogenen und standortverträglichen Entwicklung des Krankenhausstandortes Hedwigshöhe innerhalb des übergeordneten Siedlungsvorhabens „Neue Gartenstadt Falkenberg“. Schaffung der planungsrechtlichen Voraussetzungen für die Ergänzung eines neuen Klinikgebäudes zur Unterbringung zusätzlicher Funktionsbereiche der psychiatrischen Klinik. Berücksichtigung der sensiblen naturräumlichen Lage im Übergang zur Falkenbergkuppe. Kultivierung der historischen Gartenterrassen des Buntzelschen Landschaftsparks mit Sicherung gärtnerischer Nutzungen für"
