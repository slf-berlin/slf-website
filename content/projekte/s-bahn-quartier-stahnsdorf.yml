inhalt:
  - type: "spalten"
    spalten:
      - breite: 33
        html: "<p style=\"font-weight: 400;\">Durch die geplante Verlängerung der S-Bahn-Linien S 25 und S 26 von Berlinnach Stahnsdorf und den Bau der Umgehungsstraße L 77n rückt das Areal um den künftigen S-Bahnhof in den Fokus der Stahnsdorfer Gemeindeentwicklung. Um dem starken Bevölkerungswachstum und dem daraus resultierenden Wohnraumbedarf sowie den Verkehrsproblemen zu begegnen, soll auf der rund 37 Hektar großen Fläche ein nachhaltiges und verkehrstechnisch optimal angebundenes Wohnquartier entstehen.</p><p style=\"font-weight: 400;\">Das neue Quartier versteht sich als lebendige Erweiterung Stahnsdorfs, die dörfliche Qualitäten mit moderner, vernetzter Urbanität verbindet. Die Bahntrasse dient dabei nicht als Barriere, sondern als strukturierendes Element zwischen zwei eng verflochtenen Teilquartieren. Ein zentrales Freiraumsystem aus Quartierspark, Bürgerpark und begrünten Wohnhöfen verknüpft die bestehende Nachbarschaft mit dem neuen Zentrum.</p>"
