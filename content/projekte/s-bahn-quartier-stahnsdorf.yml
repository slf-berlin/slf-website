    spalten:
      - breite: 33
        html: "<p style=\"font-weight: 400;\"><strong>Infrastruktur und Soziale Vielfalt </strong></p><p style=\"font-weight: 400;\">Rund um den S-Bahnhof entsteht eine effiziente Mobilitätsdrehscheibe mit Busbahnhof, Mobilitätshaus und sozialen Ankern wie einem Ärztehaus und Bürgerzentrum. Das Wohnkonzept bietet mit rund 1.030 Wohneinheiten eine breite Palette von geförderten Mietwohnungen über Genossenschafts-modelle bis hin zu Seniorenapartments und Mehrgenerationenwohnen. Ergänzt wird dies durch eine Kita direkt am Quartierspark sowie vielfältige Freizeitangebote wie einen Sportpark und eine Skateanlage.</p>"
      - breite: 66
        html: "<p style=\"font-weight: 400;\"><strong>Nachhaltigkeit und Mobilität </strong></p><p style=\"font-weight: 400;\">Das Projekt setzt konsequent auf das Prinzip der „Schwammstadt“ mit Versickerungsmulden, Fassa-denbegrünung und Retentionsdächern zur Regen-wasserbewirtschaftung. Die Energieversorgung erfolgt nachhaltig über ein quartiersbezogenes Nahwärmenetz und Photovoltaik. Ein autoarmes Konzept priorisiert den Fuß- und Radverkehr, während Stellplätze gebündelt in Quartiersgaragen untergebracht und durch umfangreiche Sharing-Angebote ergänzt werden.</p>"
