  - type: "text"
    html: "<p>Das Freiraumkonzept des neuen Quartiers basiert auf einem vernetzten System aus vielfältigen Grünzügen, das den zentralen Quartierspark, neue Waldflächen, einen Bürgerpark sowie begrünte Wohnhöfe umfasst. Als räumliches Herzstück verknüpft der Quartierspark die bestehenden Nachbarschaften mit dem neuen Zentrum am S-Bahnhof, wobei die Bahntrasse als strukturierendes Element in die Landschaft integriert wird. Ein besonderer Fokus liegt auf dem Erhalt ökologisch wertvoller Bestandsbiotope, wie der Trockenrasen und Waldgebiete im Osten, die vollständig in das grüne Netz eingebunden werden.</p><p>Der Freiraum bietet vielfältige Angebote für die Gemeinschaft, darunter eine Kita direkt am Quartierspark, einen Sportpark mit Skateanlage am westlichen Rand sowie Spielplätze und Aufenthaltsbereiche in den Wohnhöfen. Ein engmaschiges, barrierefreies Wegenetz priorisiert den Fuß- und Radverkehr innerhalb der Grünzüge, wobei eine neue Brücke am Bahnhof die Verbindung zwischen dem Nord- und Südquartier sicherstellt.</p>"
