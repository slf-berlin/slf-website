      - breite: 50
        html: "<p><strong>Leitidee</strong></p><p>Unser Anliegen ist die ganzheitliche, integrative Entwicklung eines neuen Stadtquartiers auf dem Areal der ehemaligen Karl-Bonhoeffer-Nervenklinik unter Berücksichtigung der Leitlinien für die Neuen Stadtquartiere in Berlin, die das Abgeordnetenhaus 2018 beschlossen hat.</p><p>Das bisher introvertierte Areal wird durch die bewusste räumliche Öffnung und die funktionale sowie wegetechnische Vernetzung mit den umliegenden Quartieren und Flächen in einen zentralen, sich in alle Richtungen öffnenden Bereich transformiert.</p><p>Der Fokus des Entwurfs liegt bei einer möglichst geringen Neuversiegelung des Bodens und dem Erhalt möglichst vieler Bestandsbäume bei gleichzeitigem Verwenden von kompakten, wirtschaftlichen Gebäudetypologien und dem Ausgleich der Baumfällungen innerhalb des Entwurfsgebiets. </p><p>Die städtebauliche Figur des neuen Wohnquartiers nimmt sowohl die Ausrichtung des orthogonalen Rasters der Klinikanlage als auch die der parallel zum Olbendorfer Weg auf. Zwei zentrale Freiflächen bilden die öffentliche Mitte des neuen Quartiers. </p>"
