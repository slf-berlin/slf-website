inhalt:
  - type: "text"
    html: "<p>Das Areal der Karl-Bonhoeffer-Nervenklinik liegt im Berliner Bezirk Reinickendorf im Ortsteil Wittenau und hat eine Größe von 46 ha, wovon ca. 30 ha durch einen Klinikkomplex genutzt werden. Die GESOBAU AG plant auf einem im Westen gelegenen Teilbereich des Areals die Entwicklung eines neuen Wohnquartiers mit ca. 600 Wohnungen. Dafür sollen die nicht mehr benötigten Bestandsgebäude (sog. „Sternhäuser“) der ehemaligen Kliniknutzung aus den 1960/70er Jahren abgerissen werden.</p>"
  - type: "spalten"
    spalten:
      - breite: 33
        html: "<p>Mittels des Städtebaulichen Werkstattverfahrens möchte die GESOBAU AG städtebaulich überzeugende und qualitätsvolle Vorschläge für die Bebauung des Standortes finden, die den städtebaulichen Rahmenbedingungen wie auch freiraumplanerischen und naturschutzrechtlichen Anforderungen gerecht werden.</p><p>Ziel des Verfahrens ist es, ein abgestimmtes Entwurfskonzept für die weitere Planung der Baumaßnahmen zu erhalten.</p>"
