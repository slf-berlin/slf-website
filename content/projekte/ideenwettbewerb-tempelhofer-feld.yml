titel: "Ideenwettbewerb Tempelhofer Feld, Berlin"
untertitel: "offener zweiphasiger Ideenwettbewerb 2024"
beschreibung: "Das Projekt verfolgt eine behutsame Weiterentwicklung des Tempelhofer Feldes unter Erhalt seiner offenen Landschafts- und Parkstruktur gemäß Tempelhofgesetz und dem Entwicklungs- und Pflegeplan (EPP). Eine großflächige Wohnbebauung wird abgelehnt; stattdessen sollen punktuelle Eingriffe am Randbereich („in between“) das Feld besser mit der Umgebung verknüpfen und neue öffentliche Angebote schaffen. Leitbild Hauptziele: Erhalt des Freiraumsals Ort"
