inhalt:
  - type: "text"
    html: "<p>Das Projekt verfolgt eine behutsame Weiterentwicklung des Tempelhofer Feldes unter Erhalt seiner offenen Landschafts- und Parkstruktur gemäß Tempelhofgesetz und dem Entwicklungs- und Pflegeplan (EPP). Eine großflächige Wohnbebauung wird abgelehnt; stattdessen sollen punktuelle Eingriffe am Randbereich („in between“) das Feld besser mit der Umgebung verknüpfen und neue öffentliche Angebote schaffen.</p>"
