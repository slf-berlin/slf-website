  - type: "text"
    html: "<h3>Hauptziele:<br /><br /></h3><ul><li>Erhalt des Freiraumsals Ort für Klima- und Naturschutz, Freizeit und Gemeinschaft.</li><li>Keine Bebauung zur kurzfristigen Wohnraumschaffung, da eine Realisierung realistischerweise erst <br />nach 2031 möglich wäre.</li><li>Stärkung des partizipativen Entwicklungsprozessesmit bereits bewährter Struktur.</li></ul>"
