inhalt:
  - type: "text"
    html: "<p>Am 26.04.2018 hat die Stadtverordnetenversammlung der Stadt Hohen Neuendorf die Aufstellung des Bebauungsplans Nr. 66 „Mädchenviertel, Stadtteil Hohen Neuendorf“ beschlossen (Beschluss-Nr. B 022/2018). Übergeordnetes Ziel des Bebauungsplans ist die Sicherung einer nachhaltigen und geordneten städtebauliche Entwicklung, die den besonderen Charakter und die städtebaulichen Qualitäten im Plangebiet bewahrt. Bauliche Verdichtungen sollen auf ein städtebaulich vertretbares Maß begrenzt werden.</p><p>Der rund 82 ha große Geltungsbereich des Bebauungsplans umfasst die gesamte und überwiegend bereits bebaute Siedlungsfläche des sogenannten Mädchenviertels.</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<figure>

          \ <img width=\"860\" height=\"645\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/04/img-3312-860x645.jpg\" class=\"attachment-large size-large wp-image-3805\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/04/img-3312-860x645.jpg 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/04/img-3312-580x435.jpg 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/04/img-3312-768x576.jpg 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/04/img-3312-1536x1152.jpg 1536w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/04/img-3312-2048x1536.jpg 2048w\" sizes=\"(max-width: 860px) 100vw, 860px\" /> <figcaption>Prägendes Grün im Straßenraum und Vorgärten</figcaption>

          \ </figure>"
      - breite: 50
        html: "<p>In den vergangenen Jahren führte der vorhandene und sich verstärkende Siedlungsdruck vermehrt zur Teilung von Grundstücken und einer ungewollten Verdichtung der Baugebiete durch die zusätzliche Bebauung rückwärtiger Flächen.</p><p>Um den gewachsenen Gebietscharakter zu bewahren, das Stadtbild des „Mädchenviertels“ vor nachteiligen Veränderungen zu schützen und die künftige städtebauliche Entwicklung auf dessen Basis zu sichern, bedarf es geeigneter Festsetzungen, die den planungsrechtlichen Ordnungsrahmen für das Mädchenviertel vorgeben. Diese können nur durch einen Bebauungsplan verbindlich gesichert werden.</p>"
  - type: "spalten"
    spalten:
      - breite: 33
        html: "<p>Die konzeptionellen Planungsansätze des Bebauungsplans wurden auf der Grundlage einer umfangreichen städtebaulichen Untersuchung und Analyse der Bestandssituation im Jahr 2020 erarbeitet. Untersucht wurden die Eigenart des Gebiets, prägende städtebauliche Strukturmerkmale wie u.a.</p><p>– die Nutzungs- und Gebäudestruktur,<br />– Bautypen,<br />– Geschossigkeit,<br />– Überbauung durch Haupt- und Nebengebäude,<br />– bauliche Dichte,<br />– Grundstücksgrößen und besondere  Grünstrukturen.</p><p>Die städtebauliche Bestandsanalyse sowie die erhaltungsrechtlichen Ziele und Vorgaben bilden die Grundlage für die städtebaulichen Zielstellungen des Bebauungsplans und das verfolgte Planungskonzept, welches mit Festsetzungen über die Art und das Maß der baulichen Nutzung, die Bauweise, die überbaubaren und nicht überbaubare Grundstücksfläche sowie insbesondere auch über die Größe der Baugrundstücke umgesetzt werden soll.</p>"
      - breite: 66
        html: "<figure>

          \ <img width=\"360\" height=\"480\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/04/gif-analysezauber.gif\" class=\"attachment-medium size-medium wp-image-3801\" alt=\"\" /> <figcaption>GIS basierte Analyse</figcaption>

          \ </figure>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<img width=\"860\" height=\"918\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/04/bp66-ausschnitt-860x918.jpg\" class=\"attachment-large size-large wp-image-3792\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/04/bp66-ausschnitt-860x918.jpg 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/04/bp66-ausschnitt-580x619.jpg 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/04/bp66-ausschnitt-768x820.jpg 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/04/bp66-ausschnitt-1438x1536.jpg 1438w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2023/04/bp66-ausschnitt.jpg 1735w\" sizes=\"(max-width: 860px) 100vw, 860px\" />"
      - breite: 50
        html: "<p>Die Festsetzungen des Bebauungsplanes schaffen Beurteilungskriterien für die vorhandene und zukünftige Bebauung in diesem Bereich, die allgemein verbindlich und nachvollziehbar sind sowie eine Präzisierung des laufenden Verwaltungshandelns bedeuten. Der Bebauungsplan ist für die geordnete städtebauliche Entwicklung und Ordnung des Gebietes gem. § 1 Abs. 3 BauGB erforderlich.</p>"
