    spalten:
      - breite: 33
        html: "<p style=\"font-weight: 400;\">Im Rahmen der Entwicklung des neuen Stadtquartiers „Blankenburger Süden“ wird die Teilfläche Süd (Gewerbegebiet Heinersdorf) zu einem Modell für nachhaltige Stadtentwicklung. Ziel des Projekts ist die Schaffung eines urbanen Wohnquartiers, das Gewerbe, Freiraum, Mobilität und soziale Infrastruktur sowie die angrenzenden Landschaftsräume integriert. Das Gebiet zeichnet sich durch bestehende Freiraumstrukturen, groß-flächige, gewerbliche Areale und angrenzende aufgelockerte Wohnnutz-ungen aus.</p><p style=\"font-weight: 400;\">Die Vorbereitung und Prozesssteuerung des städtebaulich-freiraumplanerischen Realisierungswettbewerbs erfolgt im Auftrag der Senatsverwaltung für Stadtentwicklung, Bauen und Wohnen in Kooperation mit der Eigentümer-gemeinschaft Gartenstadt Heinersdorf.</p>"
      - breite: 66
        html: "<figure>

          \ <img width=\"768\" height=\"899\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/luftbild-e1774621141888-768x899.png\" class=\"attachment-medium_large size-medium_large wp-image-4530\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/luftbild-e1774621141888-768x899.png 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/luftbild-e1774621141888-580x679.png 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/luftbild-e1774621141888-1000x1171.png 1000w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/luftbild-e1774621141888-1312x1536.png 1312w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/luftbild-e1774621141888-1749x2048.png 1749w\" sizes=\"(max-width: 768px) 100vw, 768px\" /> <figcaption>Lageplan</figcaption>

          \ </figure>"
  - type: "text"
    html: "<p>Ein interdisziplinärer städtebaulich-freiraumplanerischer Realisierungswettbewerb soll innovative Entwürfe für das Gebiet liefern. Die Verfahrensbetreuung und Koordination des Realisierungswettbewerbs wird in Zusammenarbeit mit bgmr Landschaftsarchitekten, L.I.S.T. mbH und Buro Happold GmbH durch ein erfahrenes fachübergreifendes Team übernommen. Besonderes Augenmerk liegt auf Nachhaltigkeit, Klimaneutralität, sozialen und baukulturellen Ansprüchen, moderner Mobilitätsgestaltung und einer aktiven Bürgerbeteiligung, um die Ansprüche der Öffentlichkeit und Fachplanungen optimal zu verbinden.</p><p>Zur Klärung der Rahmenbedingungen des Wettbewerbs wurden vertiefende Testentwürfe, Varianten der Mobilitätsentwicklung und Fachgespräche zu den Themen Gewerbe, Freiraum/Landschaft und Mobilität geführt. Die Abstimmungen erfolgten mit den zuständigen Senats- und bezirklichen Fachverwaltungen. Die Ergebnisse des Wettbewerbs legen die Grundlage für die langfristige Entwicklung des Quartiers und die sich anschließende Bauleitplanung.</p><p>Das Verfahren integriert umfangreiche Bürgerbeteiligung und berücksichtigt bestehende Planungen, wie die langjährigen Vorbereitenden Untersuchungen und das daraus resultierende  Struktur- und Nutzungskonzept. Über die Plattform mein.berlin.de wird die Bürgerschaft frühzeitig eingebunden, um lokale Expertise und Meinungen in die Planungsprozesse einfließen zu lassen.</p>"
