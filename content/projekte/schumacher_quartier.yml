          \ </figure>"
      - breite: 66
        html: "<p>Zusätzlich gibt es multifunktionale Quartiersparks welche als Pocketparks gleichmäßig im Quartier verteilt sind. Sie beinhalten Spiel- und  Retentionsflächen und bieten so nicht nur wohnungsnahe und nutzungsintensive Grünflächen sondern tragen zur Regulierung des Stadtklimas einen erheblichen Anteil bei.</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p>Kennwerte: Quartierszentrum, 2 KiTas, Studentenwohnen, Altengerechtes Wohnen, Nachbarschaftshäuser, Einzelhandel, 2 Sportplätze, Sport- und Bewegungszentrum, Quartiersgaragen als Mobility-Hubs</p>"
