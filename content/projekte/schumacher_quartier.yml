inhalt:
  - type: "spalten"
    spalten:
      - breite: 33
        html: "<p>Gesamtkonzept für das ca. 50 ha große Areal des geschlossenen Flughafens Berlin-Tegel.</p><p>Durch die Umverlegung des Autobahnanschlusses zu einer neuen Stadtstraße kann ein neues Wohnquartier entstehen. Das robuste aber gleichzeitig flexible Gerüst ermöglicht verschiedenste Kombinatoriken und erzeugt somit eine Diversität an möglichen Typologien.</p><p>Zwei Bänder, der neue Stadtteilpark und das urbane Campusband verknüpft die Tegeler Heide mit dem Kurt-Schumacher-Platz.</p>"
