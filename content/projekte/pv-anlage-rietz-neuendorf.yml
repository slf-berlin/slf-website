inhalt:
  - type: "spalten"
    spalten:
      - breite: 33
        html: "<p>Die Gemeinde Rietz-Neuendorf hat auf Antrag des Vorhaben-trägers Green FOX Energy GmbH, als unabhängiger Projekt-entwickler und Bestandshalter von Anlagen zur Gewinnung/ Erzeugung erneuerbarer Energien, das Verfahren zur Aufstellung eines vorhaben-bezogenen Bebauungsplans für die Errichtung einer Photovoltaik-anlage im Ortsteil Herzberg nördlich der Ortslage Hartensdorf eingeleitet.</p>"
      - breite: 66
        html: "<figure>

          \ <img width=\"580\" height=\"410\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/bildschirmfoto-2025-01-17-um-104942-580x410.png\" class=\"attachment-medium size-medium wp-image-4317\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/bildschirmfoto-2025-01-17-um-104942-580x410.png 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/bildschirmfoto-2025-01-17-um-104942-860x608.png 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/bildschirmfoto-2025-01-17-um-104942-768x543.png 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/bildschirmfoto-2025-01-17-um-104942-1536x1085.png 1536w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/bildschirmfoto-2025-01-17-um-104942-2048x1447.png 2048w\" sizes=\"(max-width: 580px) 100vw, 580px\" /> <figcaption>Luftbild Lageplan (Geoportal Brandenburg)</figcaption>

          \ </figure>"
  - type: "text"
    html: "<p>Durch das Planverfahren wird eine landwirtschaftlich genutzte Flächen im Umfang von rund 21,3 ha für die Nutzung durch Anlagen zur Gewinnung solarer Strahlungsenergie qualifiziert. Die Vorhabenplanung sieht die Errichtung einer Photovoltaik-Freiflächenanlage (PV-FFA) mit einer potenziellen Leistung von rund 25 MWp (Megawatt Peak) vor. Die erzeugte Energie soll in das öffentliche Stromnetz eingespeist werden. Um auf Schwankungen der Netzauslastung reagieren zu können sind auf einer Teilfläche Batteriespeicheranlagen geplant. </p><p>Die Erstellung des Umweltberichts erfolgt durch  Stadt Land Brehm, Planungsbüro für Stadt und Landschaft in Königs Wusterhausen.</p>"
