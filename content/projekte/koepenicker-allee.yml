titel: "Ideenwerkstatt zur Entwicklung eines städtebaulichen Masterplans, Karlshorst"
untertitel: "Karlshorst, Köpenicker Allee 146-162, 2019"
beschreibung: "Erschließungskonzept Zweiphasiges, konkurrierendes Verfahren zur Entwicklung eines Wohnquartiers mit der Leitidee „Erweiterung der Gartenstadt Karlshorst“. Entwicklung von Geschosswohnungsbau mit Kita, wohnungsnahen Grünflächen und Spielplatz auf einem ehemaligen Gewerbegrundstück im Umfeld von Wohnquartieren, Kleingärten und Forschungseinrichtungen. Ziel: Erreichen einer hohen städtebaulichen räumlichen Qualität mit eindeutig zugeordneten Räumen und kleinteiligen Nachbarschaften, vielfältigen Wohnungsangebot für alle Bevölkerungsgruppen in"
