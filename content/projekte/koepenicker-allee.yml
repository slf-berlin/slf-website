          \ </figure>"
      - breite: 50
        html: "<p class=\"Text\">Zweiphasiges, konkurrierendes Verfahren zur Entwicklung eines Wohnquartiers mit der Leitidee „Erweiterung der Gartenstadt Karlshorst“.</p><p>Entwicklung von Geschosswohnungsbau mit Kita, wohnungsnahen Grünflächen und Spielplatz auf einem ehemaligen Gewerbegrundstück im Umfeld von Wohnquartieren, Kleingärten und Forschungseinrichtungen.</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p class=\"Text\">Ziel: Erreichen einer hohen städtebaulichen räumlichen Qualität mit eindeutig zugeordneten Räumen und kleinteiligen Nachbarschaften, vielfältigen Wohnungsangebot für alle Bevölkerungsgruppen in wirtschaftlicher und kostenoptimierter Bauweise und Erhalt schützenwerter Bäume.</p>"
