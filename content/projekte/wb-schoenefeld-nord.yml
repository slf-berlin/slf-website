inhalt:
  - type: "text"
    html: "<p>Die Verfahrensbetreuung des 2-phasigen Wettbewerbsverfahren beinhaltetete  zu Beginn die Klärung der Rahmenbedingungen und Zielsetzungen für die Entwicklung eines neuen Stadtquartiers für rd. 10.000 Bewohner*innen auf einer Fläche von ca. 170 ha zwischen Bahntrasse und Landesgrenze zu Berlin.</p>"
