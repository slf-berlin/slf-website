    spalten:
      - breite: 50
        html: "<figure>

          \ <img width=\"860\" height=\"608\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/03/schonefeld-luftbild-860x608.png\" class=\"attachment-large size-large wp-image-4118\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/03/schonefeld-luftbild-860x608.png 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/03/schonefeld-luftbild-580x410.png 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/03/schonefeld-luftbild-768x543.png 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/03/schonefeld-luftbild-1536x1086.png 1536w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/03/schonefeld-luftbild-2048x1448.png 2048w\" sizes=\"(max-width: 860px) 100vw, 860px\" /> <figcaption>Lageplan Luftbild (Geoportal Brandenburg)</figcaption>

