      - breite: 50
        html: "<figure>

          \ <img width=\"860\" height=\"696\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/03/bildschirmfoto-2024-02-22-um-151249-860x696.png\" class=\"attachment-large size-large wp-image-4133\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/03/bildschirmfoto-2024-02-22-um-151249-860x696.png 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/03/bildschirmfoto-2024-02-22-um-151249-580x470.png 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/03/bildschirmfoto-2024-02-22-um-151249-768x622.png 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/03/bildschirmfoto-2024-02-22-um-151249-1536x1243.png 1536w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/03/bildschirmfoto-2024-02-22-um-151249-2048x1658.png 2048w\" sizes=\"(max-width: 860px) 100vw, 860px\" /> <figcaption>Aufarbeitung Plangrundlage</figcaption>

          \ </figure>"
  - type: "spalten"
    spalten:
      - breite: 33
        html: "<p style=\"text-align: left;\">Anschließend erfolgte die Erarbeitung der Aufgabenstellung zu den Themen lebendige und vielseitige (Wohn-)Quartiere und Nachbarschaften, Integration sozialer Infrastruktureinrichtungen, Verknüpfung mit den Bestandsgebieten, Umsetzung emissionarmer Mobilitätsformen, Schaffung identitätsstiftender Landschafts- und Freiräume sowie die Berücksichtigung Klimaschutz und Klimaanpassung als Querschnittsthemen. </p>"
      - breite: 66
        html: "<figure>

          \ <img width=\"1000\" height=\"878\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/03/schonefeld-bindungen-e1750343640482-1000x878.png\" class=\"attachment-large size-large wp-image-4119\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/03/schonefeld-bindungen-e1750343640482-1000x878.png 1000w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/03/schonefeld-bindungen-e1750343640482-580x509.png 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/03/schonefeld-bindungen-e1750343640482-768x674.png 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/03/schonefeld-bindungen-e1750343640482-1536x1348.png 1536w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2022/03/schonefeld-bindungen-e1750343640482-2048x1798.png 2048w\" sizes=\"(max-width: 1000px) 100vw, 1000px\" /> <figcaption>Zusammenstellung aller Bindungen/Rahmenbedingungen</figcaption>

          \ </figure>"
  - type: "text"
    html: "<p style=\"font-size: medium;\">Es wurde eine EU-weite Ausschreibung gem. RPW mit Auswahl der Teilnehmenden aus insgesamt 32 Bewerbungen und Vorprüfung der eingereichten Wettbewerbsergebnisse durchgeführt.</p><p style=\"font-size: medium;\">Zudem wurde die Organisation, Betreuung und Durchführung zweier Preisgerichtssitzungen (1. Phase – 26 Teams, 2. Phase – 10 Teams) geleitet.</p>"
