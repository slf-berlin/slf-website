inhalt:
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<figure>

          \ <img width=\"860\" height=\"617\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2019/12/ziele-ba-e1576145861308-860x617.jpg\" class=\"attachment-large size-large wp-image-367\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2019/12/ziele-ba-e1576145861308-860x617.jpg 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2019/12/ziele-ba-e1576145861308-580x416.jpg 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2019/12/ziele-ba-e1576145861308-768x551.jpg 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2019/12/ziele-ba-e1576145861308-1536x1102.jpg 1536w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2019/12/ziele-ba-e1576145861308-2048x1469.jpg 2048w\" sizes=\"(max-width: 860px) 100vw, 860px\" /> <figcaption>Ziele Bezirksamt</figcaption>

          \ </figure>"
      - breite: 50
        html: "<p>Kooperatives Verfahren zur Leitbildentwicklung für die ca. 26 ha große Fläche des ehemaligen Rangierbahnhofs Pankow zu einem innerstädtischen Wohnquartier mit ca. 1.200 WE, Schulstandort und Verkaufsflächen für Einzelhandel und Fachmärkte sowie der Freihaltung einer Tram – Trasse.</p><p>Umfangreiche Beteiligung der Hauptakteure Eigentümerin, Senatsverwaltungen (SenSW und SenUVK) sowie den Fachämtern des Bezirks Pankow von Berlin.</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p class=\"Text\">Vorstellung und Diskussion mit politischen VertreterInnen des Bezirks sowie abschließend der Senatsbaudirektorin von Berlin. </p><p class=\"Text\">Analyse und Auswertung übergeordneter Rahmenbedingungen, Definition thematischer und sektoraler Handlungsfelder, Setzung programmatischer Schwerpunkte für drei Konzeptvarianten mit differenzierten Handlungsbedarfen. </p>"
      - breite: 50
        html: "<figure>

