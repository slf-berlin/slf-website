titel: "Leitbildentwicklung Pankower Tor, Kooperatives Verfahren mit städtebaulichen Varianten"
untertitel: "Berlin, Pankow"
beschreibung: "Ziele Bezirksamt Kooperatives Verfahren zur Leitbildentwicklung für die ca. 26 ha große Fläche des ehemaligen Rangierbahnhofs Pankow zu einem innerstädtischen Wohnquartier mit ca. 1.200 WE, Schulstandort und Verkaufsflächen für Einzelhandel und Fachmärkte sowie der Freihaltung einer Tram – Trasse. Umfangreiche Beteiligung der Hauptakteure Eigentümerin, Senatsverwaltungen (SenSW und SenUVK) sowie den Fachämtern des Bezirks Pankow von"
