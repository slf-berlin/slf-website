    spalten:
      - breite: 50
        html: "<p>Transformation einer direkt am Bahnhof Soest gelegenen Brachfläche. Das städtebauliche Konzept sieht die Öffnung und Verzahnung des neuen Wohnquartiers mit der umgebenden Stadtstruktur vor. Im Innenbereich wird eine gemeinsame Mitte mit Quartiersplatz und Grünzügen geschaffen. Die städtebauliche Grundstruktur bildet acht unterschiedliche Höfe mit differenzierten Gebäudetypologien aus.</p><p>Die Erschließung für den MIV erfolgt vom Teinenkam und führt vom Entrée bis zum Quartiersplatz. Das interne Erschließungsnetz ist autoarm angelegt.</p>"
