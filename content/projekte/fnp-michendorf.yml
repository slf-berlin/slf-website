          \ </figure>"
  - type: "text"
    html: "<p>Die aktive Einbindung der Bürger*innen und Ortsbeiräte in den Planungsprozess garantiert, dass die Perspektiven und Anliegen der Gemeinde optimal berücksichtigt werden. </p><p>Die Zusammenarbeit erfolgt mit Fugmann Janotta Partner, Berlin.</p>"
