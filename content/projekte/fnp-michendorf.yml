inhalt:
  - type: "text"
    html: "<p>Die Gemeinde Michendorf mit ihren sechs Ortsteilen Fresdorf, Langerwisch, Michendorf, Stücken, Wildenbruch und Wilhelmshorst im engeren Verflechtungsraum Berlin-Brandenburg beabsichtigt die Neuaufstellung eines gemeinsamen Flächennutzungsplans (FNP) und Landschaftsplans.</p>"
  - type: "spalten"
    spalten:
      - breite: 33
        html: "<p>Bereits die Erarbeitung des aktuell wirksamen FNPs von 2008 erfolgte durch die Zusammenarbeit von Stadt Land Fluss mit den Landschaftsplanern Fugmann Janotta Partner aus Berlin, einschließlich der Organisation und Durchführung der gemeindeinternen sowie der Öffentlichkeits- und Behördenbeteiligungen.</p><p>Ziel ist es erneut, die zukünftige städtebauliche Entwicklung bis 2040 nachhaltig zu gestalten und die aktuellen Herausforderungen in den Bereichen Wohnen, Wirtschaft, Umwelt, Energie und Mobilität zu berücksichtigen. Gleichzeitig wird mit dem Landschaftsplan sichergestellt, dass die einzigartigen Natur- und Kulturlandschaften der Region geschützt und weiterentwickelt werden.</p>"
      - breite: 66
        html: "<figure>

          \ <img width=\"580\" height=\"444\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/bildschirmfoto-2025-01-20-um-171654-e1737452998930-580x444.png\" class=\"attachment-medium size-medium wp-image-4397\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/bildschirmfoto-2025-01-20-um-171654-e1737452998930-580x444.png 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/bildschirmfoto-2025-01-20-um-171654-e1737452998930-860x658.png 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/bildschirmfoto-2025-01-20-um-171654-e1737452998930-768x587.png 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/bildschirmfoto-2025-01-20-um-171654-e1737452998930-1536x1175.png 1536w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2025/01/bildschirmfoto-2025-01-20-um-171654-e1737452998930-2048x1566.png 2048w\" sizes=\"(max-width: 580px) 100vw, 580px\" /> <figcaption>Gemeindeabgrenzung, Geoportal Brandenburg</figcaption>

          \ </figure>"
  - type: "text"
    html: "<p>Ein zentraler Fokus liegt auf der moderaten Entwicklung von Wohn- und Gewerbeflächen sowie auf der Stärkung der Ortsteile.</p><p>Im Rahmen der Bestandserfassung werden zunächst die relevanten Material- und Grundlagen erarbeitet. Dies schließt die Durchführung von Ortsteilanalysen ein. Ein wesentlicher Aspekt dieser Analyse ist das Erfassen und Darstellen von Entwicklungspotenzialen. </p><p>Dabei wird unterschieden zwischen den Potenzialen im Bestand, sowohl im beplanten als auch im unbeplanten Innenbereich, sowie den Möglichkeiten, die sich durch Innenentwicklung oder Siedlungszuwachs ergeben. Hierbei spielt der Gestaltungsraum Siedlungen sowie die entsprechenden Vorgaben zur Eigenentwicklungsoption (EEO) und des Landesentwicklungsplans (LEP HR) eine zentrale Rolle. Die umfassende Analyse dieser Faktoren ermöglicht es, fundierte Entscheidungen für zukünftige Entwicklungen zu treffen.</p>"
