  - type: "text"
    html: "<p style=\"text-align: left;\">Durch den geplanten Umzug des Cash&Carry-Marktes zum Grossmarkt Düsseldorfs entsteht ein großes Entwicklungspotenzial in unmittelbarer Nachbarschaft zu den verschiedenen Bestandsbauten der METRO und den Quartieren von Flingern-Nord. Hier wird ein wegweisendes Arbeits- und Wohn-Quartier geschaffen, ein Herz und Innovationszentrum der METRO mit neuen Landschaftsräumen, Parks und Gärten für Bewohner – ein klimagerechtes, urbanes Quartier der Zukunft.</p><p>Das Gelände an der Grafenberger Allee spielte schon lange eine prominente Rolle in der Industrie-Geschichte Düsseldorfs. Vor der jetzigen Nutzung durch die METRO war dies der Ort der berühmten Schminke Farbfabriken, der Grafenberger Walzwerke, Lieferanten des Stahls für die ersten Porsche, sowie der Hohenzollern Lokomotivwerke im Süden.</p>"
