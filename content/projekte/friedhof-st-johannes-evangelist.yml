titel: "Städtebauliches Konzept Friedhof St. Johannes-Evangelist"
untertitel: "Konkurrierendes Gutachterverfahren - 2. Preis, 2017"
beschreibung: "Transformation eines Friedhofes zu einem gemischt genutzten urbanen Wohn- und Stadtquartier als weiterer Baustein des Gefüges der historischen Siedlung Schillerpark unter Beachtung des städtebaulichen Kontextes und Schaffung neuer Vernetzungen zwischen und mit den angrenzenden Quartieren. Gliederung in zwei Teilabschnitte für kurz- und langfristige Umsetzung mit zwei unterschiedlichen Typologien: dichtere Randbebauung mit Hofbildung und klarer"
ergebnis: "2. Preis"
jahr: "2016 – 2017, Überarbeitung 2019"
kategorie:
  - "Stadt- und Quartiersentwicklung"
  - "Städtebau"
