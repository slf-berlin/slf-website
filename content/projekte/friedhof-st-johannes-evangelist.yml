  - type: "spalten"
    spalten:
      - breite: 33
        html: "<p>Neuinterpretation eines sozial orientierten Wohnungsbaus mit unterschiedlichen Bewohnergruppen durch differenzierte Wohn-typologien/Grundrissgrößen; Integration flexibler Raumeinheiten für die Nachbarschaft sowie als  Kombinationsmodul für Wohngrundrisse.</p><p class=\"Text\">2019 wurde eine Bebauungsstudie mit Werkstattverfahren zur Überprüfung der Integration von Einrichtungen der sozialen Infrastruktur (Grundschule, Kindergarten) und Abstimmung von Entwicklungsabschnitten durchgeführt.</p>"
