  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p>In dem folgenden Struktur- und Nutzungskonzept sind die wesentlichen Entwurfselemente für die Quartiersentwicklung aufgezeigt. Zum Vergleich wird daneben auch die aktuelle Situation im Plangebiet dargestellt.</p>"
      - breite: 50
        html: "<figure>

          \ <img width=\"860\" height=\"624\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/07/b10-e1737558785114-860x624.jpg\" class=\"attachment-large size-large wp-image-3366\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/07/b10-e1737558785114-860x624.jpg 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/07/b10-e1737558785114-580x421.jpg 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/07/b10-e1737558785114-768x557.jpg 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/07/b10-e1737558785114.jpg 1310w\" sizes=\"(max-width: 860px) 100vw, 860px\" /> <figcaption>Struktur- und Nutzungskonzept</figcaption>

          \ </figure>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p>In einem städtebaulichen Testentwurf wurde eine beispielhafte Planung der Gebäude- und Freiraumstrukturen vorgenommen. Für das Wohnen wird eine Hofbildung mit begrünten Innenhöfen vorgeschlagen. Während an der Wolfgang-Heinz-Straße und am Quartiersplatz durch größere Baukörper eine räumliche Fassung erfolgt, ist zur Panke eine kleinteiligere und offene Gebäudestruktur vorgesehen. Die Gebäudehöhen orientieren sich mit sechs Geschossen an der östlich angrenzenden Bestandsbebauung, zur Panke sind fünf Geschosse geplant.</p>"
      - breite: 50
        html: "<figure>

