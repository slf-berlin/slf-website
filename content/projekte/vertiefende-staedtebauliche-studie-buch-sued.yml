  - type: "spalten"
    spalten:
      - breite: 50
        html: "<figure>

          \ <img width=\"860\" height=\"801\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/07/b5-e1737558614407-860x801.jpg\" class=\"attachment-large size-large wp-image-3365\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/07/b5-e1737558614407-860x801.jpg 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/07/b5-e1737558614407-580x540.jpg 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/07/b5-e1737558614407-768x716.jpg 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/07/b5-e1737558614407.jpg 1305w\" sizes=\"(max-width: 860px) 100vw, 860px\" /> <figcaption>Schrägluftbild mit Nutzungen</figcaption>

          \ </figure>"
      - breite: 50
        html: "<p>Nachdem eine städtebauliche Rahmenplanung für das zentrale und südliche Gebiet von Buch durch das Bezirksamt am 05.05.2020 beschlossen wurde, sollen durch eine vertiefende städtebauliche Studie Vorschläge für die Weiterentwicklung der Wohnsiedlung Buch IV und die Aktivierung der Flächenpotenziale im Bereich zwischen der Ernst-Busch-Straße und dem südlich gelegenen Kappgraben gemacht werden. Wie kann ein vielfältiges und nachhaltiges Quartier aussehen, das eine Verknüpfung zu den Nachbarschaften schafft und sich in den umgebenden Landschaftraum einfügt?</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<p>Neben der programmatischen Zielsetzung von ca. 650 Wohnungen im Geschoßwohnungsbau wird der südliche Bereich konzeptionell für die Entwicklung eines Gewerbegebietes, vorwiegend für Laborgebäude des Campus-Berlin-Buch GmbH, behandelt. Als weitere Programmpunkte sind eine Quartiersgarage, eine Kindertagesstätte mit bis zu 150 Plätzen und ein öffentlicher Kinderspielplatz vorzusehen.</p>"
      - breite: 50
        html: "<figure>

          \ <img width=\"827\" height=\"860\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/05/lage-im-raum-860.jpg\" class=\"attachment-large size-large wp-image-2451\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/05/lage-im-raum-860.jpg 827w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/05/lage-im-raum-860-580x603.jpg 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/05/lage-im-raum-860-768x799.jpg 768w\" sizes=\"(max-width: 827px) 100vw, 827px\" /> <figcaption>Stadträumliche Einordnung</figcaption>

          \ </figure>"
