inhalt:
  - type: "spalten"
    spalten:
      - breite: 33
        html: "<p>In dem Plangebiet befinden sich massive Veränderungen des Stadtraumes bereits in der Umsetzung, im Planungsprozess oder sind Gegenstand des fachlichen und öffentlichen Diskurses. Der „Rahmenplan für den Stadtraum Forckenbeckstraße“ dient als mittel- bis langfristiges Konzept, das sich zwischen den Ebenen der gesamtstädtischen Planungen und der verbindlichen Bauleitplanung bewegt.</p><p>Aufgezeigt werden Entwicklungspotenziale, aus denen in Abstimmung mit der Bezirksverwaltung eine integrierte, umsetzungsorientierte und zukunftsfähige Stadtteilentwicklung für Planungsvorhaben abgeleitet werden kann.</p>"
