      - breite: 66
        html: "<p>Die Erstellung des Rahmenplanes erfolgt im Sinne der maßgeblichen Planungsvorgaben sowie den gesamt- gesellschaftlichen Rahmenbedingungen, wie demo-grafische Veränderungen, Maßnahmen zum Klimaschutz und der Klimaanpassung sowie veränderten verkehrs-politischen Zielsetzungen. Hierzu gilt es einerseits einen Überblick über die Bestandsnutzungen darzustellen und andererseits die bezirkliche und übergeordnete Planung in der Betrachtung zu überlagern, um Chancen und Möglichkeiten für die Entwicklung des Gebietes zu analysieren. Für die Flächen der BAB 100, Abzweig Steglitz (Teilbereich C) wird eine Vision für eine klimagerechte Transformation der Autobahnfläche aufgezeigt.</p>"
  - type: "text"
    html: "<p>Der Rahmenplan Forckenbeckstraße“ wurde vom Bezirksamt Bezirk Charlottenburg-Wilmersdorf am 17. Dezember 2024 als sonstige städtebauliche Planung nach § 1 Abs. 6 Nr. 11 BauGB beschlossen.</p><p>In Arbeitsgemeinschaft mit hochC Landschaftsarchitekten PartGmbB, Berlin.</p>"
