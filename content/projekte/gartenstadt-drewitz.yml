titel: "Gartenstadt Drewitz"
untertitel: "Werkstattverfahren und Fortschreibung des städtebaulichen Konzepts zum Masterplan, 2010-11"
beschreibung: "Vogelperspektive Prüfung der Machbarkeit des Konzeptes zur städtebaulichen Transformation aus dem Beitrag zum Bundeswettbewerb 2009 Umfassendes Verfahren mit Beteiligung aller relevanten Akteure in vier Werkstätten und zwei Bürgerversammlungen. Entwicklung eines städtebaulichen Masterplans für den Potsdamer Stadtteil Drewitz (40 ha) mit Integration der Verkehrs- und Freiraumplanungen z.B. für den Umbau der zentralen Erschließungsachse zu einem Stadtteilpark"
