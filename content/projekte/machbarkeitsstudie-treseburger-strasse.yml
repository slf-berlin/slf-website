inhalt:
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<figure>

          \ <img width=\"860\" height=\"756\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/06/treseburger-plangrundlage-uebergeordnet.jpg\" class=\"attachment-large size-large wp-image-1853\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/06/treseburger-plangrundlage-uebergeordnet.jpg 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/06/treseburger-plangrundlage-uebergeordnet-580x510.jpg 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/06/treseburger-plangrundlage-uebergeordnet-768x675.jpg 768w\" sizes=\"(max-width: 860px) 100vw, 860px\" /> <figcaption>Nutzungen übergeordnet</figcaption>

          \ </figure>"
      - breite: 50
        html: "<p>Ziel der Studie ist die grundlegende Klärung der Flächendisposition zur Erweiterung des bestehenden Gewerbegebietes Treseburger Straße im Bezirk Pankow. </p><p>Der Untersuchungsraum erstreckt sich vom so genannten Karower-Kreuz im Nordwesten (zukünftiger Haltepunkt für S-, Regionalbahn) bis zum Karower Damm / Sellheimbrücke im Südosten und wird durch die Bahntrasse der Regionalbahn im Norden und durch den Verlauf des Fließgewässers der Laake im Süden begrenzt.</p>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "Anhand einer vertiefenden Analyse der Bestandsflächen, die sowohl wertvolle Vegetations- bzw. Baumbestände und Fließgewässer als auch bereits extensive genutzte Lagerflächen umfassen, sollen die Rahmenbedingungen für die Entwicklung der Potenzialflächen des insgesamt ca. 19 ha großen Untersuchungsraums identifiziert und abgestimmt werden. Auf der Grundlage der Analyse insbesondere naturschutzfachlicher und verkehrlicher Aspekte des Gebietes werden Entwicklungsziele definiert und unterschiedliche städtebauliche Konzeptvarianten erarbeitet, diskutiert und bewertet."
      - breite: 50
        html: "<figure>

          \ <img width=\"860\" height=\"716\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/06/treseburger-biotopkartierung-860x716.png\" class=\"attachment-large size-large wp-image-2488\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/06/treseburger-biotopkartierung-860x716.png 860w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/06/treseburger-biotopkartierung-580x483.png 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/06/treseburger-biotopkartierung-768x640.png 768w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/06/treseburger-biotopkartierung.png 957w\" sizes=\"(max-width: 860px) 100vw, 860px\" /> <figcaption>Biotopkartierung</figcaption>

          \ </figure>"
  - type: "spalten"
    spalten:
      - breite: 50
        html: "<figure>

          \ <img width=\"844\" height=\"860\" src=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/06/treseburger-swot-860.jpg\" class=\"attachment-large size-large wp-image-2487\" alt=\"\" srcset=\"https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/06/treseburger-swot-860.jpg 844w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/06/treseburger-swot-860-580x591.jpg 580w, https://www.slf-berlin.de/wordpress/wp-content/uploads/2021/06/treseburger-swot-860-768x783.jpg 768w\" sizes=\"(max-width: 844px) 100vw, 844px\" /> <figcaption>SWOT- Analyse</figcaption>

          \ </figure>"
      - breite: 50
        html: "<p>In einer abgestimmten Vorzugsvariante wird für die Teilfläche im Bestand und die Potenzialfläche eine mittel- und langfristige Entwicklungsperspektive für das Plangebiet aufgezeigt. Durch die Studie sollen weiterhin Impulse für die Planungsziele zu einem attraktiven, urbanen und durchgrünten Gewerbegebiet gegeben werden.</p>"
