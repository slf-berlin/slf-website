inhalt:
  - type: "text"
    html: "<p style=\"font-weight: 400;\">Das neue Quartier am Kasseler Hafen kombiniert städtebauliche Dichte, funktionale Durchmischung und nachhaltige Entwicklung mit einer starken Identität am Wasser. Ausgehend von der industriellen Prägung entsteht ein urbanes, lebendiges und sozial durchmischtes Viertel, das den Uferraum der Fulda konsequent öffnet und erlebbar macht.</p><p style=\"font-weight: 400;\">Der Entwurf bildet, unter Berücksichtigung des historischen Gebäudebestandes sowie der prägnanten landschafts-räumlichen Einbindung zwischen Fluss- und Feldflur, die Grundlage für die Entwicklung und Transformation des Kasseler Hafens in ein klimagerechtes Stadtquartier mit gemischten Nutzungen und vielfältigen Freiräumen. Es bietet eine ortsspezifische Lösung für die zukünftigen Bedürfnisse in den Bereichen Wohnen, Versorgung, Arbeit, Kultur und Freizeit sowie für ökologische Aspekte, Klimaresilienz und Energieeffizienz.</p>"
