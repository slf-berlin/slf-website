  - type: "text"
    html: "<p>Im Zentrum steht eine funktional durchmischte Bebauung mit rund 440 Wohneinheiten in unterschiedlichen Wohnformen – darunter geförderter Wohnungsbau, Mehrgenerationenwohnen, Clusterwohnungen und partizipative Wohninitiativen. Die Quartiere bieten Gemeinschaftsflächen in Innenhöfen, auf Dächern sowie in Nachbarschafts-räumen und fördern so ein starkes soziales Miteinander.</p><p>Das Freiraumkonzept setzt auf naturnahe Grünzüge wie den Riverside Park, den Wahlebachgrünzug und den Gleispark, die das Quartier strukturieren und mit dem angrenzenden Landschaftsraum verzahnen. Entlang der neu gestalteten Hafenpromenade entstehen attraktive Aufenthaltsbereiche mit direktem Zugang zum Wasser, ergänzt durch Freizeitangebote wie eine Skateanlage, ein Naturspielplatz sowie gastronomische Einrichtungen. Der denkmalgeschützte Silobau wird zum identitätsstiftenden Mittelpunkt des Quartiers. Er soll in eine vielfältig nutzbare Mischung aus gewerblichen, kulturellen und gemeinschaftlichen Funktionen überführt werden, darunter Ateliers, Musikstudios, eine Kletterhalle, Büros sowie Wohnungen mit Hafenblick.</p>"
