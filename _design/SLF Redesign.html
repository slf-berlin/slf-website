<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>SLF — Redesign</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300..800;1,300..800&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" />
<style>
  /* DIN — open-source D-DIN by Datto (SIL OFL). Falls back to system DIN if installed,
     then to Barlow which is the closest free Google Fonts substitute. */
  @font-face {
    font-family: 'D-DIN';
    src: url('https://cdn.jsdelivr.net/gh/amcchord/datto-d-din@main/D-DIN.woff') format('woff'),
         url('https://cdn.jsdelivr.net/gh/amcchord/datto-d-din@main/D-DIN.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'D-DIN';
    src: url('https://cdn.jsdelivr.net/gh/amcchord/datto-d-din@main/D-DIN-Bold.woff') format('woff'),
         url('https://cdn.jsdelivr.net/gh/amcchord/datto-d-din@main/D-DIN-Bold.ttf') format('truetype');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'D-DIN';
    src: url('https://cdn.jsdelivr.net/gh/amcchord/datto-d-din@main/D-DIN-Italic.woff') format('woff'),
         url('https://cdn.jsdelivr.net/gh/amcchord/datto-d-din@main/D-DIN-Italic.ttf') format('truetype');
    font-weight: 400;
    font-style: italic;
    font-display: swap;
  }
  @font-face {
    font-family: 'D-DIN Condensed';
    src: url('https://cdn.jsdelivr.net/gh/amcchord/datto-d-din@main/D-DINCondensed.woff') format('woff'),
         url('https://cdn.jsdelivr.net/gh/amcchord/datto-d-din@main/D-DINCondensed.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: "Hanken Grotesk", system-ui, sans-serif; }
  /* Artboards reset */
  .dc-card a { color: inherit; text-decoration: none; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="project-data.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="placeholder.jsx"></script>
<script type="text/babel" src="direction-a.jsx"></script>
<script type="text/babel" src="direction-b.jsx"></script>
</head>
<body style="font-family: &quot;DIN Pro&quot;">
<div id="root"></div>

<script type="text/babel" data-presets="react">
const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showB": true,
  "showA": true,
  "monoMeta": true
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAKS_DEFAULTS);

  return (
    <>
      <DesignCanvas>
        {tweaks.showA && (
          <DCSection
            id="dir-a"
            title="A — Editorial Index"
            subtitle="Vertikaler Projekt-Feed · große Bilder · 12-Spalten-Grid"
          >
            <DCArtboard id="a-home" label="A · Willkommen" width={1280} height={3500}>
              <AHome />
            </DCArtboard>
            <DCArtboard id="a-projekte" label="A · Projekte" width={1280} height={3100}>
              <AProjekte />
            </DCArtboard>
          </DCSection>
        )}

        {tweaks.showB && (
          <DCSection
            id="dir-b"
            title="B — Archive Grid"
            subtitle="Fixes linkes Rail · Tabellen-Index · Mono-Meta"
          >
            <DCArtboard id="b-home" label="B · Willkommen" width={1280} height={2680}>
              <BHome />
            </DCArtboard>
            <DCArtboard id="b-projekte" label="B · Projekte" width={1280} height={2200}>
              <BProjekte />
            </DCArtboard>
          </DCSection>
        )}
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Sichtbarkeit">
          <TweakToggle label="Richtung A anzeigen" value={tweaks.showA} onChange={v => setTweak('showA', v)} />
          <TweakToggle label="Richtung B anzeigen" value={tweaks.showB} onChange={v => setTweak('showB', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

const waitForDeps = () => {
  if (!window.DesignCanvas || !window.AHome || !window.BHome || !window.PROJEKTE || !window.Placeholder || !window.TweaksPanel || !window.useTweaks) {
    return setTimeout(waitForDeps, 30);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
};
waitForDeps();
</script>
</body>
</html>
